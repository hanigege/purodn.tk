<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">FreeBSD Go install cover</title>
  <desc id="desc">A FreeBSD terminal themed cover for installing Go.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.54" stop-color="#eaf6f7"/>
      <stop offset="1" stop-color="#fff1ed"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d2733"/>
      <stop offset="1" stop-color="#0e151d"/>
    </linearGradient>
    <linearGradient id="go" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00add8"/>
      <stop offset="1" stop-color="#56d7e8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#243040" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1010" cy="115" r="160" fill="#00add8" opacity="0.12"/>
  <circle cx="135" cy="570" r="220" fill="#d94f3d" opacity="0.1"/>
  <g filter="url(#shadow)">
    <rect x="92" y="88" width="1016" height="500" rx="34" fill="white"/>
    <rect x="92" y="88" width="1016" height="108" rx="34" fill="#c94432"/>
    <path d="M92 162h1016v34H92z" fill="#c94432"/>
    <circle cx="145" cy="142" r="14" fill="#ffe8e2"/>
    <circle cx="190" cy="142" r="14" fill="#ffe8e2" opacity="0.75"/>
    <circle cx="235" cy="142" r="14" fill="#ffe8e2" opacity="0.55"/>
    <text x="298" y="154" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#fff">FreeBSD /usr/local/opt</text>
  </g>
  <g transform="translate(150 230)">
    <rect width="530" height="260" rx="24" fill="url(#panel)"/>
    <text x="42" y="70" font-family="Menlo, Consolas, monospace" font-size="30" fill="#8ee6f2">$ fetch go1.26.0</text>
    <text x="42" y="122" font-family="Menlo, Consolas, monospace" font-size="30" fill="#cfd7df">$ tar -C /usr/local</text>
    <text x="42" y="174" font-family="Menlo, Consolas, monospace" font-size="30" fill="#cfd7df">$ go version</text>
    <rect x="42" y="204" width="252" height="16" rx="8" fill="#00add8"/>
    <rect x="314" y="204" width="92" height="16" rx="8" fill="#d94f3d"/>
  </g>
  <g transform="translate(725 238)">
    <rect x="0" y="0" width="310" height="152" rx="76" fill="url(#go)"/>
    <text x="42" y="103" font-family="Arial, Helvetica, sans-serif" font-size="96" font-weight="800" fill="#073642">Go</text>
    <path d="M60 196h250" stroke="#c94432" stroke-width="18" stroke-linecap="round"/>
    <path d="M112 234h156" stroke="#243040" stroke-width="18" stroke-linecap="round" opacity="0.8"/>
    <text x="0" y="292" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="800" fill="#222b35">Install Latest Go</text>
  </g>
</svg>
