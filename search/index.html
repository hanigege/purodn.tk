    <main>
      
  <section class="search-page">
    <header class="archive-header">
      <p>搜索</p>
      <h1>站内搜索</h1>
      <span>输入关键词，搜索文章标题、摘要、分类和标签。</span>
    </header>

    <form class="search-page-form" action="/search/" method="get">
      <input id="search-input" name="q" type="search" placeholder="搜索软路由、Linux、Docker..." autocomplete="off" autofocus>
      <button type="submit">搜索</button>
    </form>

    <p class="search-status" id="search-status">请输入关键词开始搜索。</p>
    <div class="search-results card-feed" id="search-results"></div>
  </section>

  <script>
    (function () {
      const input = document.getElementById("search-input");
      const status = document.getElementById("search-status");
      const results = document.getElementById("search-results");
      const params = new URLSearchParams(window.location.search);
      const initialQuery = (params.get("q") || "").trim();
      let index = [];

      input.value = initialQuery;

      function normalize(value) {
        return String(value || "").toLowerCase().trim();
      }

      function render(items, query) {
        results.innerHTML = "";
        if (!query) {
          status.textContent = "请输入关键词开始搜索。";
          return;
        }
        if (!items.length) {
          status.textContent = "没有找到与“" + query + "”相关的文章。";
          return;
        }

        status.textContent = "找到 " + items.length + " 篇与“" + query + "”相关的文章。";
        const fragment = document.createDocumentFragment();

        items.forEach(function (item) {
          const card = document.createElement("article");
          card.className = "post-card";
          const category = Array.isArray(item.categories) && item.categories.length ? item.categories[0] : "文章";
          card.innerHTML =
            '<a class="post-thumb" href="' + item.url + '" aria-label="' + item.title.replace(/"/g, "&quot;") + '">' +
              '<img src="' + (item.image || "/images/computer-tutorial-hero.png") + '" alt="">' +
            '</a>' +
            '<div class="post-body">' +
              '<h2><a href="' + item.url + '">' + item.title + '</a></h2>' +
              '<div class="post-meta"><span>' + category + '</span><time>' + item.date + '</time></div>' +
            '</div>';
          fragment.appendChild(card);
        });

        results.appendChild(fragment);
      }

      function search(query) {
        const normalizedQuery = normalize(query);
        const terms = normalizedQuery.split(/\s+/).filter(Boolean);
        const matched = index.filter(function (item) {
          const haystack = normalize([
            item.title,
            item.summary,
            item.content,
            (item.categories || []).join(" "),
            (item.tags || []).join(" ")
          ].join(" "));
          return terms.every(function (term) {
            return haystack.includes(term);
          });
        });
        render(matched, query);
      }

      fetch("/index.json")
        .then(function (response) { return response.json(); })
        .then(function (data) {
          index = Array.isArray(data) ? data : [];
          search(initialQuery);
        })
        .catch(function () {
          status.textContent = "搜索索引加载失败，请稍后刷新页面。";
        });

      input.addEventListener("input", function () {
        const query = input.value.trim();
        const url = new URL(window.location.href);
        if (query) {
          url.searchParams.set("q", query);
        } else {
          url.searchParams.delete("q");
        }
        window.history.replaceState({}, "", url);
        search(query);
      });
    })();
  </script>
