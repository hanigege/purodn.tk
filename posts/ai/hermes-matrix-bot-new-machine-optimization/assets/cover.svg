<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Hermes Matrix bot optimization cover</title>
  <desc id="desc">A Matrix and Hermes Agent themed terminal cover for conservative new machine optimization.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#152033"/>
      <stop offset="0.5" stop-color="#24364b"/>
      <stop offset="1" stop-color="#263f3d"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1280" cy="210" r="190" fill="#22c55e" opacity="0.13"/>
  <circle cx="260" cy="720" r="230" fill="#60a5fa" opacity="0.14"/>
  <g transform="translate(154 126)" filter="url(#shadow)">
    <rect width="1292" height="648" rx="28" fill="url(#panel)"/>
    <rect width="1292" height="72" rx="28" fill="#1f2937"/>
    <circle cx="48" cy="36" r="12" fill="#f97316"/>
    <circle cx="88" cy="36" r="12" fill="#facc15"/>
    <circle cx="128" cy="36" r="12" fill="#22c55e"/>
    <text x="646" y="46" text-anchor="middle" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#cbd5e1">hermes-matrix-new-machine</text>
    <g font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="33">
      <text x="78" y="158" fill="#86efac">$ hermes config set approvals.mode smart</text>
      <text x="78" y="224" fill="#93c5fd">$ hermes config set display.tool_progress off</text>
      <text x="78" y="290" fill="#c4b5fd">$ hermes config set matrix.require_mention true</text>
      <text x="78" y="356" fill="#fbbf24">$ systemctl --user status hermes-gateway</text>
      <text x="78" y="422" fill="#f8fafc">//status  //approve  //restart</text>
    </g>
    <g transform="translate(960 158)">
      <rect x="0" y="0" width="250" height="250" rx="40" fill="#22c55e" opacity="0.92"/>
      <path d="M68 72h112c20 0 36 16 36 36v46c0 20-16 36-36 36H122l-46 38v-38h-8c-20 0-36-16-36-36v-46c0-20 16-36 36-36z" fill="#052e16"/>
      <text x="125" y="150" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="900" fill="#dcfce7">M</text>
      <path d="M54 308h170" fill="none" stroke="#60a5fa" stroke-width="14" stroke-linecap="round"/>
      <path d="M182 270l42 38-42 38" fill="none" stroke="#60a5fa" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="125" y="384" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#dbeafe">quiet and safe</text>
    </g>
    <text x="78" y="572" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="#f8fafc">Hermes Matrix 机器人新机优化</text>
    <text x="78" y="624" font-family="Inter, Arial, sans-serif" font-size="28" fill="#cbd5e1">smart approvals, quiet display, room safety and backups</text>
  </g>
</svg>
