<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Hermes Agent backup and migration cover</title>
  <desc id="desc">A technical cover showing a Hermes backup archive moving profiles, memory, skills, and gateway data from an old server to a new server.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.48" stop-color="#16324f"/>
      <stop offset="1" stop-color="#0f3b36"/>
    </linearGradient>
    <linearGradient id="zip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8d36b"/>
      <stop offset="1" stop-color="#e68b4b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#263f5f"/>
      <stop offset="1" stop-color="#14253d"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020817" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <path d="M0 482 C180 418 250 535 430 474 C606 415 720 350 914 409 C1045 449 1115 435 1200 390 L1200 630 L0 630 Z" fill="#102923" opacity="0.74"/>
  <path d="M0 96 C168 137 260 52 426 100 C610 153 727 204 900 150 C1039 107 1113 126 1200 167 L1200 0 L0 0 Z" fill="#1e5d70" opacity="0.22"/>

  <g filter="url(#softShadow)">
    <g transform="translate(94 170)">
      <rect width="250" height="266" rx="20" fill="url(#panel)" stroke="#79a8c4" stroke-opacity="0.42"/>
      <rect x="32" y="40" width="186" height="28" rx="8" fill="#9fd3ee" opacity="0.2"/>
      <rect x="32" y="94" width="80" height="78" rx="12" fill="#203c58" stroke="#84d6bd" stroke-opacity="0.55"/>
      <rect x="138" y="94" width="80" height="78" rx="12" fill="#203c58" stroke="#84d6bd" stroke-opacity="0.55"/>
      <rect x="32" y="198" width="186" height="18" rx="9" fill="#d6ecff" opacity="0.25"/>
      <rect x="32" y="229" width="132" height="18" rx="9" fill="#d6ecff" opacity="0.18"/>
      <text x="125" y="318" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#e8f7ff">OLD</text>
    </g>

    <g transform="translate(476 196)">
      <path d="M42 0 H184 L246 62 V210 H42 Z" fill="url(#zip)" stroke="#fff2ba" stroke-opacity="0.65"/>
      <path d="M184 0 V62 H246" fill="#f7be58" stroke="#fff2ba" stroke-opacity="0.65"/>
      <rect x="76" y="28" width="30" height="24" fill="#754a2a" opacity="0.7"/>
      <rect x="76" y="56" width="30" height="24" fill="#fff3b5" opacity="0.72"/>
      <rect x="76" y="84" width="30" height="24" fill="#754a2a" opacity="0.7"/>
      <rect x="76" y="112" width="30" height="24" fill="#fff3b5" opacity="0.72"/>
      <rect x="76" y="140" width="30" height="24" fill="#754a2a" opacity="0.7"/>
      <text x="143" y="132" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="800" fill="#4e311f">ZIP</text>
      <text x="143" y="170" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#5b3822">backup</text>
    </g>

    <g transform="translate(856 170)">
      <rect width="250" height="266" rx="20" fill="url(#panel)" stroke="#9be7d2" stroke-opacity="0.52"/>
      <rect x="32" y="40" width="186" height="28" rx="8" fill="#a8f0d5" opacity="0.22"/>
      <rect x="32" y="94" width="80" height="78" rx="12" fill="#17384a" stroke="#f4d06f" stroke-opacity="0.58"/>
      <rect x="138" y="94" width="80" height="78" rx="12" fill="#17384a" stroke="#f4d06f" stroke-opacity="0.58"/>
      <rect x="32" y="198" width="186" height="18" rx="9" fill="#dffbf2" opacity="0.27"/>
      <rect x="32" y="229" width="132" height="18" rx="9" fill="#dffbf2" opacity="0.2"/>
      <text x="125" y="318" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#e8fff7">NEW</text>
    </g>
  </g>

  <path d="M356 302 H452" stroke="#c8f7ff" stroke-width="10" stroke-linecap="round"/>
  <path d="M428 266 L464 302 L428 338" fill="none" stroke="#c8f7ff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M742 302 H838" stroke="#c8f7ff" stroke-width="10" stroke-linecap="round"/>
  <path d="M814 266 L850 302 L814 338" fill="none" stroke="#c8f7ff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="600" y="88" text-anchor="middle" font-size="58" font-weight="800" fill="#f8fbff">Hermes Backup / Import</text>
    <text x="600" y="135" text-anchor="middle" font-size="26" fill="#cfe9f5">profiles · skills · memory · sessions · gateway state</text>
    <g transform="translate(290 500)">
      <rect width="620" height="62" rx="18" fill="#07111f" opacity="0.62" stroke="#9bdccc" stroke-opacity="0.32"/>
      <text x="310" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#f7fbff">backup → transfer → import → restart</text>
    </g>
  </g>
</svg>
