<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'SF Mono','Fira Code','Consolas',monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="400" fill="url(#bg)" rx="12"/>

  <!-- CLI badge -->
  <rect x="310" y="20" width="180" height="28" rx="14" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="400" y="39" text-anchor="middle" fill="#38bdf8" font-size="12" font-weight="600">💻 终端 CLI 场景</text>

  <text x="400" y="72" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700">Hermes Agent 多 Profile 实战指南</text>
  <text x="400" y="95" text-anchor="middle" fill="#94a3b8" font-size="13">一个实例、多个分身，终端下各司其职</text>

  <line x1="120" y1="110" x2="680" y2="110" stroke="#334155" stroke-width="1"/>

  <!-- Profile cards -->
  <g filter="url(#shadow)">
    <rect x="30" y="125" width="170" height="130" rx="10" fill="#1e293b" stroke="url(#g1)" stroke-width="1.5"/>
    <rect x="30" y="125" width="170" height="32" rx="10" fill="#312e81" opacity="0.5"/>
    <text x="115" y="146" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="700">◆ default</text>
    <text x="115" y="175" text-anchor="middle" fill="#94a3b8" font-size="11">蜜 · 日常助理</text>
    <text x="115" y="200" text-anchor="middle" fill="#64748b" font-size="11" font-family="monospace">$ hermes</text>
    <text x="115" y="220" text-anchor="middle" fill="#64748b" font-size="11" font-family="monospace">$ hermes chat 你好</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="220" y="125" width="170" height="130" rx="10" fill="#1e293b" stroke="url(#g2)" stroke-width="1.5"/>
    <rect x="220" y="125" width="170" height="32" rx="10" fill="#78350f" opacity="0.5"/>
    <text x="305" y="146" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="700">code</text>
    <text x="305" y="175" text-anchor="middle" fill="#94a3b8" font-size="11">佬 · 开发运维</text>
    <text x="305" y="200" text-anchor="middle" fill="#64748b" font-size="11" font-family="monospace">$ hermes -p code</text>
    <text x="305" y="220" text-anchor="middle" fill="#64748b" font-size="11" font-family="monospace">$ code   # 别名</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="410" y="125" width="170" height="130" rx="10" fill="#1e293b" stroke="url(#g3)" stroke-width="1.5"/>
    <rect x="410" y="125" width="170" height="32" rx="10" fill="#064e3b" opacity="0.5"/>
    <text x="495" y="146" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="700">shaoji</text>
    <text x="495" y="175" text-anchor="middle" fill="#94a3b8" font-size="11">烧鸡 · 业务 Bot</text>
    <text x="495" y="200" text-anchor="middle" fill="#64748b" font-size="11" font-family="monospace">$ hermes -p shaoji</text>
    <text x="495" y="220" text-anchor="middle" fill="#64748b" font-size="11" font-family="monospace">$ shaoji  # 别名</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="600" y="125" width="170" height="130" rx="10" fill="#1e293b" stroke="url(#g4)" stroke-width="1.5"/>
    <rect x="600" y="125" width="170" height="32" rx="10" fill="#831843" opacity="0.5"/>
    <text x="685" y="146" text-anchor="middle" fill="#f9a8d4" font-size="12" font-weight="700">singbox</text>
    <text x="685" y="175" text-anchor="middle" fill="#94a3b8" font-size="11">面板专项</text>
    <text x="685" y="200" text-anchor="middle" fill="#64748b" font-size="11" font-family="monospace">$ hermes -p singbox</text>
    <text x="685" y="220" text-anchor="middle" fill="#64748b" font-size="11" font-family="monospace">$ singbox  # 别名</text>
  </g>

  <!-- Bottom: CLI commands -->
  <rect x="30" y="280" width="740" height="100" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="50" y="305" fill="#94a3b8" font-size="11" font-weight="600">终端下切换 Profile</text>

  <text x="50" y="328" fill="#64748b" font-size="11"># 查看所有 Profile</text>
  <text x="50" y="348" fill="#a5b4fc" font-size="13">$ hermes profile list</text>

  <text x="50" y="372" fill="#64748b" font-size="11"># 用哪个就敲哪个，各不干扰</text>
</svg>
