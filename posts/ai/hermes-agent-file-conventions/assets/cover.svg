<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'SF Mono','Fira Code','Consolas',monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="55" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700">Hermes Agent 文件约定</text>
  <text x="400" y="80" text-anchor="middle" fill="#94a3b8" font-size="13">SOUL.md · .hermes.md · AGENTS.md 定位与用法</text>

  <!-- Divider -->
  <line x1="180" y1="95" x2="620" y2="95" stroke="#334155" stroke-width="1"/>

  <!-- File block 1: SOUL.md -->
  <g filter="url(#glow)">
    <rect x="60" y="115" width="210" height="115" rx="8" fill="#1e293b" stroke="url(#accent)" stroke-width="1.5"/>
    <rect x="60" y="115" width="210" height="32" rx="8" fill="#312e81" opacity="0.6"/>
    <text x="165" y="136" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="600">SOUL.md</text>
    <text x="75" y="163" fill="#cbd5e1" font-size="11">📋 人格 · 行为风格 · 长期身份</text>
    <text x="75" y="182" fill="#64748b" font-size="10">位置: ~/.hermes/SOUL.md</text>
    <text x="75" y="198" fill="#64748b" font-size="10">范围: 全局（所有项目）</text>
    <text x="75" y="214" fill="#64748b" font-size="10">作用: AI 工程师的个人偏好</text>
  </g>

  <!-- Arrow 1 -->
  <text x="285" y="172" fill="#475569" font-size="20" text-anchor="middle">→</text>

  <!-- File block 2: .hermes.md -->
  <g filter="url(#glow)">
    <rect x="300" y="115" width="210" height="115" rx="8" fill="#1e293b" stroke="url(#accent2)" stroke-width="1.5"/>
    <rect x="300" y="115" width="210" height="32" rx="8" fill="#78350f" opacity="0.6"/>
    <text x="405" y="136" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="600">.hermes.md</text>
    <text x="315" y="163" fill="#cbd5e1" font-size="11">📌 项目宪法 · 最高优先级</text>
    <text x="315" y="182" fill="#64748b" font-size="10">位置: 项目根目录</text>
    <text x="315" y="198" fill="#64748b" font-size="10">范围: 单个项目</text>
    <text x="315" y="214" fill="#64748b" font-size="10">作用: 目标·规则·不可违反事项</text>
  </g>

  <!-- Arrow 2 -->
  <text x="525" y="172" fill="#475569" font-size="20" text-anchor="middle">→</text>

  <!-- File block 3: AGENTS.md -->
  <g filter="url(#glow)">
    <rect x="540" y="115" width="210" height="115" rx="8" fill="#1e293b" stroke="url(#accent3)" stroke-width="1.5"/>
    <rect x="540" y="115" width="210" height="32" rx="8" fill="#064e3b" opacity="0.6"/>
    <text x="645" y="136" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="600">AGENTS.md</text>
    <text x="555" y="163" fill="#cbd5e1" font-size="11">📐 架构 · 开发规范</text>
    <text x="555" y="182" fill="#64748b" font-size="10">位置: 项目目录 (可递归)</text>
    <text x="555" y="198" fill="#64748b" font-size="10">范围: 子目录可覆盖</text>
    <text x="555" y="214" fill="#64748b" font-size="10">作用: 编码规范·构建流程</text>
  </g>

  <!-- Bottom: Directory tree example -->
  <rect x="60" y="255" width="690" height="125" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>

  <text x="75" y="278" fill="#94a3b8" font-size="11" font-weight="600">目录结构推荐</text>

  <text x="75" y="298" fill="#f59e0b" font-size="12">~/projects/matrix-manager/</text>
  <text x="95" y="315" fill="#a5b4fc" font-size="12">├── .hermes.md</text>
  <text x="95" y="332" fill="#6ee7b7" font-size="12">├── AGENTS.md</text>
  <text x="95" y="349" fill="#94a3b8" font-size="12">├── backend/</text>
  <text x="115" y="366" fill="#6ee7b7" font-size="12">│   └── AGENTS.md</text>

  <text x="330" y="315" fill="#94a3b8" font-size="12">└── frontend/</text>
  <text x="350" y="332" fill="#6ee7b7" font-size="12">└── AGENTS.md</text>

  <text x="550" y="340" fill="#64748b" font-size="10" font-style="italic">SOUL.md → ~/.hermes/SOUL.md（全局）</text>
</svg>
