<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'SF Mono','Fira Code','Consolas',monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="yolo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#ef4444" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>

  <!-- YOLO Badge -->
  <g filter="url(#shadow)">
    <rect x="310" y="30" width="180" height="60" rx="30" fill="url(#yolo)" opacity="0.15"/>
    <rect x="310" y="30" width="180" height="60" rx="30" fill="none" stroke="url(#glow)" stroke-width="2"/>
    <text x="400" y="70" text-anchor="middle" fill="#fca5a5" font-size="28" font-weight="800" letter-spacing="4">YOLO</text>
  </g>

  <!-- Title -->
  <text x="400" y="115" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700">Hermes Agent 全自动模式（YOLO）</text>
  <text x="400" y="140" text-anchor="middle" fill="#94a3b8" font-size="13">跳过命令审批，Agent 自主决策执行</text>

  <!-- Divider -->
  <line x1="150" y1="155" x2="650" y2="155" stroke="#334155" stroke-width="1"/>

  <!-- Three methods -->
  <!-- Method 1 -->
  <rect x="40" y="170" width="230" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="40" y="170" width="230" height="28" rx="8" fill="#7f1d1d" opacity="0.5"/>
  <text x="155" y="190" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">① 临时启动</text>
  <text x="55" y="212" fill="#94a3b8" font-size="11" font-family="monospace">hermes chat --yolo</text>
  <text x="55" y="232" fill="#64748b" font-size="10">单次会话生效</text>
  <text x="55" y="252" fill="#64748b" font-size="10">不修改配置文件</text>

  <!-- Method 2 -->
  <rect x="285" y="170" width="230" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="285" y="170" width="230" height="28" rx="8" fill="#7f1d1d" opacity="0.5"/>
  <text x="400" y="190" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">② 动态切换</text>
  <text x="300" y="212" fill="#94a3b8" font-size="11" font-family="monospace">/yolo</text>
  <text x="300" y="232" fill="#64748b" font-size="10">会话中开关切换</text>
  <text x="300" y="252" fill="#64748b" font-size="10">无需重启</text>

  <!-- Method 3 -->
  <rect x="530" y="170" width="230" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="530" y="170" width="230" height="28" rx="8" fill="#7f1d1d" opacity="0.5"/>
  <text x="645" y="190" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">③ 永久配置</text>
  <text x="545" y="212" fill="#94a3b8" font-size="10" font-family="monospace">hermes config set</text>
  <text x="545" y="228" fill="#fcd34d" font-size="10" font-family="monospace">approvals.mode off</text>
  <text x="545" y="252" fill="#64748b" font-size="10">每次启动默认 YOLO</text>

  <!-- Warning -->
  <rect x="40" y="290" width="720" height="90" rx="8" fill="#451a03" stroke="#f59e0b" stroke-width="1"/>
  <text x="60" y="315" fill="#fbbf24" font-size="14" font-weight="600">⚠️ 安全警告</text>
  <text x="60" y="337" fill="#fdba74" font-size="11">YOLO 模式下 Hermes 拥有直接执行任何命令的完整权限</text>
  <text x="60" y="357" fill="#fdba74" font-size="11">包括 rm -rf、修改系统文件、网络请求等危险操作</text>
  <text x="60" y="377" fill="#64748b" font-size="11">建议配合 Docker/Sandbox 隔离环境使用</text>
</svg>
