<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" rx="12"/>
  
  <!-- Server rack icon -->
  <g transform="translate(100, 180)" fill="none" stroke="#00d4ff" stroke-width="3">
    <rect x="0" y="0" width="120" height="260" rx="6" fill="#1a1a2e" stroke="rgba(0,212,255,0.3)"/>
    <rect x="15" y="20" width="90" height="30" rx="3" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.4)"/>
    <circle cx="30" cy="35" r="4" fill="#00d4ff"/>
    <rect x="15" y="65" width="90" height="30" rx="3" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.4)"/>
    <circle cx="30" cy="80" r="4" fill="#00d4ff"/>
    <rect x="15" y="110" width="90" height="30" rx="3" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.4)"/>
    <circle cx="30" cy="125" r="4" fill="#ff4444"/>
    <rect x="15" y="155" width="90" height="30" rx="3" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.4)"/>
    <circle cx="30" cy="170" r="4" fill="#ff4444"/>
  </g>

  <!-- Data flow arrows -->
  <path d="M 230 240 Q 280 200 330 240" stroke="#7b2ff7" stroke-width="2" fill="none" stroke-dasharray="6,4" opacity="0.6"/>
  <path d="M 230 280 Q 280 320 330 280" stroke="#7b2ff7" stroke-width="2" fill="none" stroke-dasharray="6,4" opacity="0.6"/>

  <!-- Terminal icon -->
  <g transform="translate(370, 200)" fill="none" stroke="#00ff88" stroke-width="2">
    <rect x="0" y="0" width="200" height="140" rx="6" fill="#0d1117" stroke="rgba(0,255,136,0.3)"/>
    <circle cx="12" cy="16" r="3" fill="#ff5f56"/>
    <circle cx="24" cy="16" r="3" fill="#ffbd2e"/>
    <circle cx="36" cy="16" r="3" fill="#27c93f"/>
    <text x="50" y="60" font-family="monospace" font-size="12" fill="#00ff88" opacity="0.8">
      <tspan x="14" dy="0">$ git clone github.com/.../hermes.git</tspan>
      <tspan x="14" dy="20">$ cd ~/.hermes</tspan>
      <tspan x="14" dy="20">$ hermes setup</tspan>
    </text>
  </g>

  <!-- Recovery arrow -->
  <path d="M 570 270 Q 640 150 710 270" stroke="url(#accent)" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4ff"/>
    </marker>
  </defs>

  <!-- Checkmark icon -->
  <g transform="translate(740, 220)">
    <circle cx="60" cy="60" r="55" fill="none" stroke="#27c93f" stroke-width="3" opacity="0.3"/>
    <path d="M35 60 L52 77 L85 44" fill="none" stroke="#27c93f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="600" y="450" text-anchor="middle" font-family="sans-serif" font-size="48" font-weight="bold" fill="#ffffff" letter-spacing="2">
    Hermes 灾难恢复手册
  </text>
  <text x="600" y="490" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#8888aa" letter-spacing="1">
    从零手动重建所有服务
  </text>
  <text x="600" y="520" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#555577">
    git clone → 安装 → 配置 → 启动
  </text>

  <!-- Bottom line -->
  <line x1="200" y1="560" x2="1000" y2="560" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
</svg>
