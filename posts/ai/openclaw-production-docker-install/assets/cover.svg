  </g>

  <g transform="translate(516 178)">
    <path d="M126 0 C185 0 232 47 232 106 C232 165 185 212 126 212 C67 212 20 165 20 106 C20 47 67 0 126 0 Z" fill="#111a22" stroke="#4b6070" stroke-width="3"/>
    <path d="M126 42 C161 42 190 71 190 106 C190 141 161 170 126 170 C91 170 62 141 62 106 C62 71 91 42 126 42 Z" fill="#24323d"/>
