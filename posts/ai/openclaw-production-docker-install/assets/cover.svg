    <rect x="88" y="82" width="1024" height="58" rx="22" fill="#111a22"/>
    <circle cx="126" cy="111" r="8" fill="#ef4444"/>
    <circle cx="154" cy="111" r="8" fill="#f59e0b"/>
    <circle cx="182" cy="111" r="8" fill="#22c55e"/>
  </g>

  <g transform="translate(150 190)">
