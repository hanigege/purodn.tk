<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw production Docker deployment</title>
  <desc id="desc">A production OpenClaw gateway protected behind Docker, SSH tunnel, firewall, backups, and security audit layers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="0.48" stop-color="#17212b"/>
      <stop offset="1" stop-color="#253229"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#26323e"/>
      <stop offset="1" stop-color="#1b252c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <path d="M0 474 C180 414 320 520 490 456 C650 396 782 278 958 318 C1060 341 1130 402 1200 374 L1200 630 L0 630 Z" fill="#20362f" opacity="0.9"/>
  <path d="M0 552 C170 500 334 544 512 505 C710 462 850 378 1010 430 C1090 456 1150 505 1200 485 L1200 630 L0 630 Z" fill="#15251f" opacity="0.95"/>

