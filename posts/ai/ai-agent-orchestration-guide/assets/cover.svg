<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="box1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#1a5276"/>
    </linearGradient>
    <linearGradient id="box2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <linearGradient id="box3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60"/>
      <stop offset="100%" style="stop-color:#229954"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e94560"/>
    </marker>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <g fill="#ffffff" opacity="0.05">
    <circle cx="50" cy="50" r="2"/><circle cx="150" cy="50" r="2"/>
    <circle cx="250" cy="50" r="2"/><circle cx="350" cy="50" r="2"/>
    <circle cx="450" cy="50" r="2"/><circle cx="550" cy="50" r="2"/>
    <circle cx="650" cy="50" r="2"/><circle cx="750" cy="50" r="2"/>
    <circle cx="50" cy="150" r="2"/><circle cx="150" cy="150" r="2"/>
    <circle cx="250" cy="150" r="2"/><circle cx="350" cy="150" r="2"/>
    <circle cx="450" cy="150" r="2"/><circle cx="550" cy="150" r="2"/>
    <circle cx="650" cy="150" r="2"/><circle cx="750" cy="150" r="2"/>
    <circle cx="50" cy="250" r="2"/><circle cx="150" cy="250" r="2"/>
    <circle cx="250" cy="250" r="2"/><circle cx="350" cy="250" r="2"/>
    <circle cx="450" cy="250" r="2"/><circle cx="550" cy="250" r="2"/>
    <circle cx="650" cy="250" r="2"/><circle cx="750" cy="250" r="2"/>
    <circle cx="50" cy="350" r="2"/><circle cx="150" cy="350" r="2"/>
    <circle cx="250" cy="350" r="2"/><circle cx="350" cy="350" r="2"/>
    <circle cx="450" cy="350" r="2"/><circle cx="550" cy="350" r="2"/>
    <circle cx="650" cy="350" r="2"/><circle cx="750" cy="350" r="2"/>
  </g>
  <text x="400" y="60" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="26" font-weight="bold">AI助手多轮分工协作指南</text>
  <text x="400" y="88" text-anchor="middle" fill="#e94560" font-family="sans-serif" font-size="14" opacity="0.8">用内循环模式管好你的每一个项目</text>
  <rect x="60" y="120" width="200" height="80" rx="12" fill="url(#box1)" filter="url(#shadow)"/>
  <text x="70" y="150" fill="#ffffff" font-family="sans-serif" font-size="13" font-weight="bold">📋 第1步</text>
  <text x="70" y="170" fill="#a0c4ff" font-family="sans-serif" font-size="12">分轮发任务</text>
  <text x="70" y="188" fill="#a0c4ff" font-family="sans-serif" font-size="11" opacity="0.7">"第N轮：做XX模块"</text>
  <line x1="260" y1="160" x2="310" y2="160" stroke="#e94560" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="320" y="120" width="200" height="80" rx="12" fill="url(#box2)" filter="url(#shadow)"/>
  <text x="330" y="150" fill="#ffffff" font-family="sans-serif" font-size="13" font-weight="bold">⚙️ 第2步</text>
  <text x="330" y="170" fill="#ffb3b3" font-family="sans-serif" font-size="12">派 coding小工干活</text>
  <text x="330" y="188" fill="#ffb3b3" font-family="sans-serif" font-size="11" opacity="0.7">完成代码 + 跑测试</text>
  <line x1="520" y1="160" x2="570" y2="160" stroke="#e94560" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="580" y="120" width="170" height="80" rx="12" fill="url(#box3)" filter="url(#shadow)"/>
  <text x="590" y="150" fill="#ffffff" font-family="sans-serif" font-size="13" font-weight="bold">🔍 第3步</text>
  <text x="590" y="170" fill="#a8e6cf" font-family="sans-serif" font-size="12">审查质量</text>
  <text x="590" y="188" fill="#a8e6cf" font-family="sans-serif" font-size="11" opacity="0.7">规格+代码双重检查</text>
  <path d="M 665 200 L 665 250 L 160 250 L 160 200" fill="none" stroke="#e94560" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="400" y="270" text-anchor="middle" fill="#e94560" font-family="sans-serif" font-size="11">❌ 不通过 → 循环修复</text>
  <line x1="400" y1="285" x2="400" y2="320" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="250" y="330" width="300" height="60" rx="30" fill="none" stroke="#27ae60" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="400" y="360" text-anchor="middle" fill="#27ae60" font-family="sans-serif" font-size="15" font-weight="bold">✅ 全部通过 → 交付</text>
  <text x="400" y="435" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="10" opacity="0.3">适用于 Hermes Agent 及其它支持子任务调度的 AI 平台</text>
</svg>