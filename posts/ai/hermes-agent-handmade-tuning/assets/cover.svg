<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Hermes Agent tuning cover</title>
  <desc id="desc">Layered Hermes Agent configuration with model routing, Telegram, memory, skills, approvals, and profiles.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="0.48" stop-color="#182434"/>
      <stop offset="1" stop-color="#23322f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f0dc"/>
      <stop offset="1" stop-color="#e7d8b6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <path d="M0 700 C210 620 390 760 610 690 C860 612 1010 540 1240 620 C1395 674 1495 662 1600 600 L1600 900 L0 900 Z" fill="#d08b3e" opacity="0.16"/>
  <path d="M0 760 C230 710 350 815 590 746 C820 680 1015 696 1215 748 C1395 795 1500 760 1600 714 L1600 900 L0 900 Z" fill="#4fb3a2" opacity="0.18"/>

  <g filter="url(#shadow)">
    <rect x="150" y="130" width="1300" height="640" rx="26" fill="#f7f3e7"/>
    <rect x="150" y="130" width="1300" height="88" rx="26" fill="url(#panel)"/>
    <path d="M150 192 H1450 V218 H150 Z" fill="#d8c79d"/>
  </g>

  <circle cx="205" cy="174" r="13" fill="#e85d4f"/>
  <circle cx="247" cy="174" r="13" fill="#e0aa36"/>
  <circle cx="289" cy="174" r="13" fill="#4fae73"/>

  <text x="350" y="184" font-family="Menlo, Consolas, monospace" font-size="29" fill="#2a332f">hermes.config.toml</text>

  <g font-family="Menlo, Consolas, monospace" font-size="28" fill="#20302c">
    <text x="230" y="285">[models]</text>
    <text x="230" y="332" fill="#5b6b63">main = "wanfeng/chat"</text>
    <text x="230" y="379" fill="#5b6b63">vision = "wanfeng/vision"</text>

    <text x="230" y="466">[telegram]</text>
    <text x="230" y="513" fill="#5b6b63">final_answer_only = true</text>
    <text x="230" y="560" fill="#5b6b63">approval_buttons = true</text>

    <text x="230" y="647">[memory]</text>
    <text x="230" y="694" fill="#5b6b63">write_policy = "long_term_only"</text>
  </g>

  <g transform="translate(990 286)">
    <rect x="0" y="0" width="260" height="74" rx="12" fill="#285d68"/>
    <text x="130" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#fff8e6">Main Model</text>
    <path d="M130 78 V126" stroke="#43615a" stroke-width="8" stroke-linecap="round"/>
    <rect x="-85" y="128" width="430" height="76" rx="12" fill="#d08b3e"/>
    <text x="130" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#1f2727">Auxiliary Models</text>
    <path d="M130 208 V256" stroke="#43615a" stroke-width="8" stroke-linecap="round"/>
    <rect x="-30" y="258" width="320" height="76" rx="12" fill="#4fb3a2"/>
    <text x="130" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#102421">Telegram Clean UI</text>
  </g>

  <g stroke="#273e3a" stroke-width="5" fill="none" opacity="0.45">
    <path d="M872 325 C780 325 746 332 690 332"/>
    <path d="M872 455 C782 455 748 466 690 466"/>
    <path d="M872 585 C782 585 748 647 690 647"/>
  </g>

  <text x="154" y="837" font-family="Arial, sans-serif" font-size="48" font-weight="800" fill="#fff8e6">Hermes Agent 手搓调优配置</text>
  <text x="154" y="878" font-family="Arial, sans-serif" font-size="25" fill="#d8e6de">模型分工 · Telegram 降噪 · Memory 克制 · Skills 沉淀 · Profiles 隔离</text>
</svg>
