<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Alpine 普通用户主目录修复</title>
  <desc id="desc">Alpine Linux 重装后普通用户主目录、Neovim XDG 目录和 SSH 密钥目录修复示意图</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.45" stop-color="#164e63"/>
      <stop offset="1" stop-color="#14532d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <g opacity="0.18" fill="none" stroke="#e2e8f0" stroke-width="2">
    <path d="M95 130h1090M95 220h1090M95 310h1090M95 400h1090M95 490h1090M95 580h1090"/>
    <path d="M185 80v590M365 80v590M545 80v590M725 80v590M905 80v590M1085 80v590"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="95" y="92" width="1090" height="536" rx="20" fill="#f8fafc"/>
    <rect x="95" y="92" width="1090" height="76" rx="20" fill="#0f766e"/>
    <rect x="95" y="140" width="1090" height="28" fill="#0f766e"/>
  </g>
  <circle cx="135" cy="130" r="11" fill="#ef4444"/>
  <circle cx="171" cy="130" r="11" fill="#f59e0b"/>
  <circle cx="207" cy="130" r="11" fill="#22c55e"/>
  <text x="250" y="139" fill="#ecfeff" font-family="Menlo, Consolas, monospace" font-size="24">alpine 3.23 / user home recovery</text>
  <g font-family="Menlo, Consolas, monospace" font-size="28" fill="#0f172a">
    <text x="140" y="230">$ sudo -i</text>
    <text x="140" y="285"># install -d -o jay -g jay -m 755 /home/jay</text>
    <text x="140" y="340"># chown -R jay:jay /home/jay</text>
    <text x="140" y="395">$ mkdir -p ~/.local/share/nvim ~/.cache/nvim ~/.config/nvim</text>
    <text x="140" y="450">$ chmod 700 ~/.ssh &amp;&amp; chmod 600 ~/.ssh/authorized_keys</text>
  </g>
  <g transform="translate(805 488)">
    <rect x="0" y="0" width="270" height="74" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="32" y="48" fill="#14532d" font-family="Menlo, Consolas, monospace" font-size="28">jay owns $HOME</text>
  </g>
  <g transform="translate(150 520)" fill="none" stroke="#0f766e" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 36h120"/>
    <path d="M80 0l40 36-40 36"/>
    <path d="M178 36h120"/>
    <path d="M258 0l40 36-40 36"/>
  </g>
  <g font-family="Menlo, Consolas, monospace" font-size="22" fill="#334155">
    <text x="150" y="602">passwd</text>
    <text x="330" y="602">/home/jay</text>
    <text x="550" y="602">nvim + ssh</text>
  </g>
</svg>
