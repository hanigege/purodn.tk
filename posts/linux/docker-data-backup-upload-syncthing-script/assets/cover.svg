<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Docker data backup upload to Syncthing source directory</title>
  <desc id="desc">A technical cover showing Docker data packaged, uploaded over SSH, and synchronized by Syncthing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#10212f"/>
      <stop offset="0.52" stop-color="#17394a"/>
      <stop offset="1" stop-color="#1d513f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#d9f5ea" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#061018" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <path d="M0 560 C180 500 300 590 470 532 C620 480 735 395 900 432 C1050 466 1120 560 1280 500 L1280 720 L0 720 Z" fill="#0f2d36" opacity="0.72"/>
  <path d="M0 608 C210 555 360 630 560 582 C720 544 830 485 1000 525 C1120 554 1190 610 1280 590 L1280 720 L0 720 Z" fill="#0b2028" opacity="0.82"/>

  <g filter="url(#shadow)">
    <rect x="110" y="136" width="250" height="250" rx="22" fill="url(#panel)"/>
    <rect x="515" y="136" width="250" height="250" rx="22" fill="url(#panel)"/>
    <rect x="920" y="136" width="250" height="250" rx="22" fill="url(#panel)"/>
  </g>

  <g fill="none" stroke="#77e0c3" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M380 262 H492"/>
    <path d="M470 240 L494 262 L470 284"/>
    <path d="M785 262 H897"/>
    <path d="M875 240 L899 262 L875 284"/>
  </g>

  <g transform="translate(160 188)">
    <rect x="0" y="72" width="150" height="82" rx="12" fill="#2496ed"/>
    <rect x="18" y="40" width="28" height="28" rx="4" fill="#2496ed"/>
    <rect x="54" y="40" width="28" height="28" rx="4" fill="#2496ed"/>
    <rect x="90" y="40" width="28" height="28" rx="4" fill="#2496ed"/>
    <rect x="54" y="4" width="28" height="28" rx="4" fill="#2496ed"/>
    <rect x="90" y="4" width="28" height="28" rx="4" fill="#2496ed"/>
    <path d="M18 112 H132" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
    <circle cx="44" cy="138" r="8" fill="#ffffff"/>
    <circle cx="76" cy="138" r="8" fill="#ffffff"/>
    <circle cx="108" cy="138" r="8" fill="#ffffff"/>
  </g>

  <g transform="translate(563 178)">
    <rect x="18" y="38" width="118" height="154" rx="14" fill="#1d2b34"/>
    <path d="M42 72 H112 M42 100 H112 M42 128 H94" stroke="#d9f5ea" stroke-width="10" stroke-linecap="round"/>
    <path d="M35 180 L77 140 L119 180" fill="none" stroke="#77e0c3" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="18" y="196" width="118" height="22" rx="11" fill="#77e0c3"/>
  </g>

  <g transform="translate(962 185)">
    <circle cx="80" cy="74" r="50" fill="#00a88e"/>
    <circle cx="80" cy="74" r="22" fill="#eafff8"/>
    <path d="M80 24 A50 50 0 0 1 126 94" fill="none" stroke="#10212f" stroke-width="13" stroke-linecap="round"/>
    <path d="M121 123 A50 50 0 0 1 38 113" fill="none" stroke="#10212f" stroke-width="13" stroke-linecap="round"/>
    <path d="M35 102 A50 50 0 0 1 65 27" fill="none" stroke="#10212f" stroke-width="13" stroke-linecap="round"/>
    <rect x="18" y="150" width="124" height="54" rx="12" fill="#1d2b34"/>
    <path d="M43 177 H117" stroke="#d9f5ea" stroke-width="10" stroke-linecap="round"/>
  </g>

  <g fill="#d9f5ea" font-family="Inter, Avenir Next, Arial, sans-serif" text-anchor="middle">
    <text x="235" y="442" font-size="34" font-weight="700">Docker Data</text>
    <text x="640" y="442" font-size="34" font-weight="700">SSH Upload</text>
    <text x="1045" y="442" font-size="34" font-weight="700">Syncthing</text>
  </g>

  <g font-family="Inter, Avenir Next, Arial, sans-serif">
    <text x="96" y="568" fill="#ffffff" font-size="48" font-weight="800">Docker Backup Pipeline</text>
    <text x="98" y="622" fill="#bcefe0" font-size="28">tar.gz -> /tmp upload -> chown -> /srv/backup -> sync</text>
  </g>
