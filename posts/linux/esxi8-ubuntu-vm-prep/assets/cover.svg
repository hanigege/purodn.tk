<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ESXi 8 Ubuntu VM preparation cover</title>
  <desc id="desc">A terminal and network themed cover for ESXi 8 Ubuntu virtual machine preparation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="0.52" stop-color="#26344a"/>
      <stop offset="1" stop-color="#33413b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1260" cy="210" r="190" fill="#22c55e" opacity="0.12"/>
  <circle cx="260" cy="720" r="230" fill="#f97316" opacity="0.16"/>
  <g transform="translate(154 126)" filter="url(#shadow)">
    <rect width="1292" height="648" rx="28" fill="url(#panel)"/>
    <rect width="1292" height="72" rx="28" fill="#1f2937"/>
    <circle cx="48" cy="36" r="12" fill="#f97316"/>
    <circle cx="88" cy="36" r="12" fill="#facc15"/>
    <circle cx="128" cy="36" r="12" fill="#22c55e"/>
    <text x="646" y="46" text-anchor="middle" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#cbd5e1">esxi8-ubuntu-vm-prep</text>
    <g font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="34">
      <text x="78" y="160" fill="#fb923c">$ cloud-init user-data</text>
      <text x="78" y="228" fill="#93c5fd">$ systemctl restart ssh</text>
      <text x="78" y="296" fill="#86efac">$ netplan apply</text>
      <text x="78" y="364" fill="#c4b5fd">$ lsof -i:53</text>
      <text x="78" y="432" fill="#f8fafc">$ snapshot before DNS setup</text>
    </g>
    <g transform="translate(950 152)">
      <rect x="0" y="0" width="250" height="160" rx="24" fill="#1d4ed8" opacity="0.92"/>
      <rect x="38" y="42" width="174" height="76" rx="12" fill="#bfdbfe" opacity="0.95"/>
      <text x="125" y="92" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900" fill="#1e3a8a">VM</text>
      <path d="M125 194v56M70 250h110M180 250h50" fill="none" stroke="#22c55e" stroke-width="12" stroke-linecap="round"/>
      <circle cx="70" cy="250" r="18" fill="#22c55e"/>
      <circle cx="180" cy="250" r="18" fill="#22c55e"/>
      <circle cx="230" cy="250" r="18" fill="#22c55e"/>
      <text x="125" y="330" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#d1fae5">ESXi 8 + Ubuntu</text>
    </g>
    <text x="78" y="572" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="#f8fafc">ESXi 8 安装 Ubuntu 前置配置</text>
    <text x="78" y="624" font-family="Inter, Arial, sans-serif" font-size="28" fill="#cbd5e1">cloud-init, SSH, netplan static IP and port 53</text>
  </g>
</svg>
