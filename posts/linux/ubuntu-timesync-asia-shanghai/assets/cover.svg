<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Ubuntu Debian time synchronization cover</title>
  <desc id="desc">A Linux server clock synchronized to Beijing time using NTP.</desc>
  <rect width="1280" height="720" fill="#172033"/>
  <rect x="80" y="88" width="1160" height="544" rx="8" fill="#f4f7fb"/>
  <rect x="80" y="88" width="1160" height="86" rx="8" fill="#24324c"/>
  <circle cx="122" cy="131" r="13" fill="#ff6b6b"/>
  <circle cx="164" cy="131" r="13" fill="#ffd166"/>
  <circle cx="206" cy="131" r="13" fill="#2a9d8f"/>
  <text x="96" y="242" fill="#223049" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="42" font-weight="700">Asia/Shanghai</text>
  <text x="96" y="304" fill="#50627d" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="30">System clock synchronized: yes</text>
  <text x="96" y="360" fill="#50627d" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="30">NTP: ntp.aliyun.com</text>
  <g transform="translate(835 210)">
    <circle cx="145" cy="145" r="122" fill="#ffffff" stroke="#24324c" stroke-width="14"/>
    <line x1="145" y1="145" x2="145" y2="66" stroke="#2a9d8f" stroke-width="14" stroke-linecap="round"/>
    <line x1="145" y1="145" x2="218" y2="145" stroke="#e76f51" stroke-width="14" stroke-linecap="round"/>
    <circle cx="145" cy="145" r="12" fill="#24324c"/>
    <text x="76" y="318" fill="#24324c" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="34" font-weight="700">CST +0800</text>
  </g>
  <path d="M96 480h560" stroke="#2a9d8f" stroke-width="8" stroke-linecap="round"/>
  <path d="M96 526h420" stroke="#e76f51" stroke-width="8" stroke-linecap="round"/>
  <path d="M96 572h500" stroke="#50627d" stroke-width="8" stroke-linecap="round"/>
</svg>
