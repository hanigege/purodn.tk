<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Ubuntu chrony time sync cover</title>
  <desc id="desc">A terminal themed cover showing Ubuntu server time synchronization with chrony and NTP.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#18212f"/>
      <stop offset="0.5" stop-color="#273547"/>
      <stop offset="1" stop-color="#34413b"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1265" cy="210" r="190" fill="#14b8a6" opacity="0.13"/>
  <circle cx="260" cy="710" r="230" fill="#e95420" opacity="0.18"/>
  <g transform="translate(154 126)" filter="url(#shadow)">
    <rect width="1292" height="648" rx="28" fill="url(#terminal)"/>
    <rect width="1292" height="70" rx="28" fill="#1f2937"/>
    <circle cx="46" cy="35" r="12" fill="#f97316"/>
    <circle cx="86" cy="35" r="12" fill="#facc15"/>
    <circle cx="126" cy="35" r="12" fill="#22c55e"/>
    <text x="648" y="45" text-anchor="middle" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22" fill="#cbd5e1">ubuntu-beijing-time-chrony</text>
    <g font-family="SFMono-Regular, Menlo, Consolas, monospace">
      <text x="74" y="150" font-size="32" fill="#fb923c">$ sudo timedatectl set-timezone Asia/Shanghai</text>
      <text x="74" y="214" font-size="32" fill="#93c5fd">$ sudo apt install chrony -y</text>
      <text x="74" y="278" font-size="32" fill="#86efac">$ sudo systemctl restart chrony</text>
      <text x="74" y="342" font-size="32" fill="#c4b5fd">$ chronyc sources -v</text>
      <text x="74" y="406" font-size="32" fill="#f8fafc">$ date  # CST +0800</text>
    </g>
    <g transform="translate(930 168)">
      <circle cx="142" cy="142" r="118" fill="#f8fafc" opacity="0.08" stroke="#f8fafc" stroke-opacity="0.36" stroke-width="8"/>
      <circle cx="142" cy="142" r="14" fill="#f8fafc"/>
      <path d="M142 76v74l58 38" fill="none" stroke="#f8fafc" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M34 316h216" fill="none" stroke="#22c55e" stroke-width="12" stroke-linecap="round"/>
      <path d="M70 284l-36 32 36 32" fill="none" stroke="#22c55e" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M214 284l36 32-36 32" fill="none" stroke="#22c55e" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="142" y="395" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#d1fae5">NTP</text>
    </g>
    <text x="74" y="572" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="#f8fafc">Ubuntu 设置北京时间</text>
    <text x="74" y="624" font-family="Inter, Arial, sans-serif" font-size="28" fill="#cbd5e1">Asia/Shanghai + chrony NTP sync</text>
  </g>
</svg>
