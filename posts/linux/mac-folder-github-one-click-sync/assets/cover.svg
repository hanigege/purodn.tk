<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Mac 文件夹与 GitHub 一键同步</title>
  <desc id="desc">Mac 本地文件夹、Git 分支和 GitHub 仓库之间的同步流程示意图</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f8fb"/>
      <stop offset="1" stop-color="#e6edf5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#172033" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="72" y="70" width="1056" height="490" rx="30" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="72" y="70" width="1056" height="72" rx="30" fill="#1f2937"/>
  <circle cx="118" cy="106" r="10" fill="#ef4444"/>
  <circle cx="150" cy="106" r="10" fill="#f59e0b"/>
  <circle cx="182" cy="106" r="10" fill="#22c55e"/>
  <text x="230" y="115" font-family="Menlo, Consolas, monospace" font-size="25" fill="#e5e7eb">/Users/mana/Documents/codex/file</text>

  <g transform="translate(120 205)">
    <rect width="250" height="205" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
    <path d="M42 72h166a16 16 0 0 1 16 16v72a16 16 0 0 1-16 16H42a16 16 0 0 1-16-16V72z" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
    <path d="M44 55h72l25 27H44a14 14 0 0 0-14 14V69a14 14 0 0 1 14-14z" fill="#bfdbfe" stroke="#2563eb" stroke-width="4"/>
    <text x="125" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#172554">本地文件夹</text>
    <text x="125" y="148" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="18" fill="#334155">file/</text>
  </g>

  <g transform="translate(475 205)">
    <rect width="250" height="205" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
    <circle cx="125" cy="75" r="28" fill="#f97316"/>
