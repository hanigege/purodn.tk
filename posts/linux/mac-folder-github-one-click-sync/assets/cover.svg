    <rect width="250" height="205" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
    <circle cx="125" cy="88" r="48" fill="#111827"/>
    <path d="M105 104c-17 5-17-8-24-11m48 36v-25c0-7-2-12-6-15 20-2 41-10 41-43 0-10-4-18-10-25 1-2 4-12-1-25 0 0-8-3-27 10a93 93 0 0 0-49 0C58-3 50 0 50 0c-5 13-2 23-1 25-6 7-10 15-10 25 0 33 21 41 41 43-3 3-5 8-5 15v21" transform="translate(44 47) scale(.82)" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
