<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">sing-box production manual restore cover</title>
  <desc id="desc">A production gateway backup archive restored into a new Linux machine, with DNS port 53 and systemd services highlighted.</desc>
  <rect width="1200" height="630" fill="#f5f7fb"/>
  <rect x="70" y="70" width="1060" height="490" rx="8" fill="#ffffff" stroke="#d4dbe8" stroke-width="2"/>
  <rect x="70" y="70" width="1060" height="78" rx="8" fill="#1f2937"/>
  <circle cx="112" cy="109" r="10" fill="#f87171"/>
  <circle cx="145" cy="109" r="10" fill="#fbbf24"/>
  <circle cx="178" cy="109" r="10" fill="#34d399"/>
  <text x="220" y="118" font-family="Menlo, Consolas, monospace" font-size="24" fill="#e5e7eb">sing-box production restore</text>
  <g transform="translate(120 195)">
    <rect x="0" y="0" width="260" height="260" rx="8" fill="#eef2ff" stroke="#818cf8" stroke-width="2"/>
    <path d="M68 76h124l34 38v92H34V76h34z" fill="#ffffff" stroke="#4f46e5" stroke-width="6" stroke-linejoin="round"/>
    <path d="M192 76v38h34" fill="none" stroke="#4f46e5" stroke-width="6" stroke-linejoin="round"/>
    <text x="58" y="159" font-family="Menlo, Consolas, monospace" font-size="24" font-weight="700" fill="#3730a3">backup.tar.gz</text>
    <text x="64" y="195" font-family="Menlo, Consolas, monospace" font-size="18" fill="#4338ca">sha256 OK</text>
  </g>
  <g transform="translate(470 195)">
    <rect x="0" y="0" width="260" height="260" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
    <rect x="54" y="64" width="152" height="108" rx="6" fill="#ffffff" stroke="#0891b2" stroke-width="6"/>
    <rect x="82" y="96" width="96" height="16" fill="#0891b2"/>
    <rect x="82" y="126" width="64" height="16" fill="#0891b2"/>
    <rect x="100" y="190" width="60" height="16" fill="#0891b2"/>
    <text x="58" y="232" font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700" fill="#155e75">new linux host</text>
  </g>
  <g transform="translate(820 195)">
    <rect x="0" y="0" width="260" height="260" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <circle cx="130" cy="104" r="56" fill="#ffffff" stroke="#16a34a" stroke-width="6"/>
    <text x="94" y="116" font-family="Menlo, Consolas, monospace" font-size="38" font-weight="700" fill="#166534">53</text>
    <path d="M82 184h96M82 216h96" stroke="#16a34a" stroke-width="12" stroke-linecap="round"/>
    <text x="46" y="250" font-family="Menlo, Consolas, monospace" font-size="20" font-weight="700" fill="#166534">DNS + systemd</text>
  </g>
  <path d="M397 325h54" stroke="#64748b" stroke-width="8" stroke-linecap="round"/>
  <path d="M450 325l-20-16v32z" fill="#64748b"/>
  <path d="M747 325h54" stroke="#64748b" stroke-width="8" stroke-linecap="round"/>
  <path d="M800 325l-20-16v32z" fill="#64748b"/>
  <text x="120" y="520" font-family="Menlo, Consolas, monospace" font-size="22" fill="#334155">/etc/sing-box  /opt/singbox-rule-ui  /usr/local/sbin  systemd units</text>
</svg>
