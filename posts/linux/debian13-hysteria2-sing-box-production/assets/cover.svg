<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Debian 13 Hysteria2 sing-box production node</title>
  <desc id="desc">A production Hysteria2 node on Debian 13 connected to a sing-box client over UDP 443.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.5" stop-color="#16303a"/>
      <stop offset="1" stop-color="#1e3a2f"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#62d6ff"/>
      <stop offset="1" stop-color="#7ef0a8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.2" stroke="#d6f7ff" stroke-width="1">
    <path d="M0 120h1200M0 240h1200M0 360h1200M0 480h1200"/>
    <path d="M160 0v630M320 0v630M480 0v630M640 0v630M800 0v630M960 0v630"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="88" y="216" width="270" height="160" rx="16" fill="#f8fbff"/>
    <text x="122" y="270" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800" fill="#0f172a">sing-box</text>
    <text x="122" y="312" font-family="Menlo, Consolas, monospace" font-size="20" fill="#334155">10.20.20.6</text>
    <text x="122" y="342" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">selectors stay intact</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="828" y="182" width="284" height="226" rx="16" fill="#f8fbff"/>
    <text x="862" y="238" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800" fill="#0f172a">Debian 13</text>
    <text x="862" y="280" font-family="Menlo, Consolas, monospace" font-size="22" fill="#334155">Hysteria2</text>
    <text x="862" y="314" font-family="Menlo, Consolas, monospace" font-size="22" fill="#334155">UDP 443</text>
    <text x="862" y="356" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">systemd hardened</text>
  </g>
  <path d="M374 296 C 494 206, 656 206, 812 296" fill="none" stroke="url(#line)" stroke-width="11" stroke-linecap="round"/>
  <path d="M790 274 L 820 296 L 786 314" fill="none" stroke="#7ef0a8" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="494" y="250" font-family="Menlo, Consolas, monospace" font-size="24" fill="#d9fff0">HY2 / QUIC</text>
  <text x="514" y="338" font-family="Menlo, Consolas, monospace" font-size="22" fill="#bae6fd">salamander + TLS</text>
  <text x="80" y="92" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="850" fill="#ffffff">Debian 13 Hysteria2</text>
  <text x="80" y="138" font-family="Inter, Arial, sans-serif" font-size="26" fill="#cdeee9">simple production node for sing-box routing</text>
  <text x="80" y="550" font-family="Menlo, Consolas, monospace" font-size="22" fill="#bdebdc">proxy.example.com -> UDP/443 -> hysteria-server.service</text>
</svg>
