<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Hugo dual repository workflow</title>
  <desc id="desc">A diagram showing Hugo source, build, public repository, and GitHub Pages.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14213d"/>
      <stop offset="0.52" stop-color="#22304f"/>
      <stop offset="1" stop-color="#2f3e46"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2ec4b6"/>
      <stop offset="1" stop-color="#fcbf49"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#06101f" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <path d="M0 560 C190 510 260 650 440 596 C640 536 720 438 914 492 C1080 538 1148 478 1280 410 L1280 720 L0 720 Z" fill="#0b1020" opacity="0.32"/>
  <path d="M96 128 H1184" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" opacity="0.92"/>

  <text x="96" y="88" fill="#f8fafc" font-family="Menlo, Consolas, monospace" font-size="34" font-weight="700">Hugo 双仓库工作流</text>
  <text x="96" y="172" fill="#dbeafe" font-family="Menlo, Consolas, monospace" font-size="24">purodn 发布 public/ · purodncode 备份源码</text>

  <g filter="url(#shadow)">
    <rect x="92" y="250" width="245" height="170" rx="14" fill="#f8fafc"/>
    <rect x="92" y="250" width="245" height="42" rx="14" fill="#2ec4b6"/>
    <path d="M92 278 H337 V292 H92 Z" fill="#2ec4b6"/>
    <text x="120" y="278" fill="#082f2d" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="700">source repo</text>
    <text x="120" y="332" fill="#1f2937" font-family="Menlo, Consolas, monospace" font-size="18">content/</text>
    <text x="120" y="364" fill="#1f2937" font-family="Menlo, Consolas, monospace" font-size="18">layouts/</text>
    <text x="120" y="396" fill="#1f2937" font-family="Menlo, Consolas, monospace" font-size="18">assets/</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="407" y="250" width="210" height="170" rx="14" fill="#f8fafc"/>
    <rect x="407" y="250" width="210" height="42" rx="14" fill="#fcbf49"/>
    <path d="M407 278 H617 V292 H407 Z" fill="#fcbf49"/>
    <text x="435" y="278" fill="#422006" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="700">hugo build</text>
    <text x="435" y="340" fill="#1f2937" font-family="Menlo, Consolas, monospace" font-size="20">--minify</text>
    <text x="435" y="378" fill="#1f2937" font-family="Menlo, Consolas, monospace" font-size="20">--gc</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="687" y="250" width="245" height="170" rx="14" fill="#f8fafc"/>
    <rect x="687" y="250" width="245" height="42" rx="14" fill="#e76f51"/>
    <path d="M687 278 H932 V292 H687 Z" fill="#e76f51"/>
    <text x="715" y="278" fill="#431407" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="700">public repo</text>
    <text x="715" y="332" fill="#1f2937" font-family="Menlo, Consolas, monospace" font-size="18">index.html</text>
    <text x="715" y="364" fill="#1f2937" font-family="Menlo, Consolas, monospace" font-size="18">posts/</text>
    <text x="715" y="396" fill="#1f2937" font-family="Menlo, Consolas, monospace" font-size="18">sitemap.xml</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1002" y="250" width="186" height="170" rx="14" fill="#f8fafc"/>
    <rect x="1002" y="250" width="186" height="42" rx="14" fill="#8ecae6"/>
    <path d="M1002 278 H1188 V292 H1002 Z" fill="#8ecae6"/>
    <text x="1030" y="278" fill="#0c4a6e" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="700">Pages</text>
    <circle cx="1095" cy="348" r="34" fill="#14213d"/>
    <path d="M1074 349 H1116 M1095 328 C1084 340 1084 358 1095 370 M1095 328 C1106 340 1106 358 1095 370" fill="none" stroke="#f8fafc" stroke-width="5" stroke-linecap="round"/>
  </g>

  <g fill="none" stroke="#f8fafc" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.88">
    <path d="M350 335 H390"/>
    <path d="M382 323 L394 335 L382 347"/>
    <path d="M630 335 H670"/>
    <path d="M662 323 L674 335 L662 347"/>
    <path d="M945 335 H985"/>
    <path d="M977 323 L989 335 L977 347"/>
  </g>

  <g font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700">
    <text x="138" y="515" fill="#2ec4b6">purodncode</text>
    <text x="458" y="515" fill="#fcbf49">hugo</text>
    <text x="760" y="515" fill="#e76f51">purodn</text>
  </g>
  <text x="96" y="620" fill="#f8fafc" font-family="Menlo, Consolas, monospace" font-size="24">源码归源码，发布归发布；两个仓库，各走各的 Git 流程。</text>
</svg>
