<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#1f6feb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Title -->
  <text x="600" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#fff" text-anchor="middle" letter-spacing="2">
    Matrix Synapse
  </text>
  <text x="600" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="url(#accent)" text-anchor="middle" letter-spacing="2">
    小白手搓教程
  </text>

  <!-- Subtitle -->
  <text x="600" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#8b949e" text-anchor="middle" letter-spacing="1">
    从零搭建完整聊天服务（含语音视频通话）
  </text>

  <!-- Decorative line -->
  <rect x="430" y="330" width="340" height="3" rx="1.5" fill="url(#accent)" filter="url(#glow)"/>

  <!-- Tech stack icons - simplified boxes -->
  <g transform="translate(180, 400)">
    <rect width="120" height="40" rx="8" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
    <text x="60" y="26" font-family="monospace" font-size="14" fill="#58a6ff" text-anchor="middle">Synapse</text>
  </g>
  <g transform="translate(320, 400)">
    <rect width="120" height="40" rx="8" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
    <text x="60" y="26" font-family="monospace" font-size="14" fill="#7ee787" text-anchor="middle">Docker</text>
  </g>
  <g transform="translate(460, 400)">
    <rect width="120" height="40" rx="8" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
    <text x="60" y="26" font-family="monospace" font-size="14" fill="#d2a8ff" text-anchor="middle">LiveKit</text>
  </g>
  <g transform="translate(600, 400)">
    <rect width="120" height="40" rx="8" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
    <text x="60" y="26" font-family="monospace" font-size="14" fill="#ffa657" text-anchor="middle">PostgreSQL</text>
  </g>
  <g transform="translate(740, 400)">
    <rect width="120" height="40" rx="8" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
    <text x="60" y="26" font-family="monospace" font-size="14" fill="#ff7b72" text-anchor="middle">Element</text>
  </g>
  <g transform="translate(880, 400)">
    <rect width="120" height="40" rx="8" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
    <text x="60" y="26" font-family="monospace" font-size="14" fill="#79c0ff" text-anchor="middle">NPM</text>
  </g>

  <!-- Architecture flow -->
  <g transform="translate(300, 490)">
    <rect x="0" y="0" width="160" height="50" rx="10" fill="#0d419d" opacity="0.8"/>
    <text x="80" y="30" font-family="system-ui" font-size="14" fill="#fff" text-anchor="middle">Cloudflare Worker</text>
  </g>
  <g transform="translate(490, 490)">
    <rect x="0" y="0" width="160" height="50" rx="10" fill="#238636" opacity="0.8"/>
    <text x="80" y="30" font-family="system-ui" font-size="14" fill="#fff" text-anchor="middle">Nginx Proxy Manager</text>
  </g>
  <g transform="translate(680, 490)">
    <rect x="0" y="0" width="160" height="50" rx="10" fill="#9e6a03" opacity="0.8"/>
    <text x="80" y="30" font-family="system-ui" font-size="14" fill="#fff" text-anchor="middle">Docker 容器栈</text>
  </g>

  <!-- Arrow between boxes -->
  <line x1="460" y1="515" x2="490" y2="515" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="650" y1="515" x2="680" y2="515" stroke="#58a6ff" stroke-width="2"/>

  <!-- Container icons at bottom -->
  <g transform="translate(150, 560)" opacity="0.3">
    <rect width="30" height="20" rx="3" fill="#30363d"/>
  </g>
  <g transform="translate(190, 560)" opacity="0.3">
    <rect width="30" height="20" rx="3" fill="#30363d"/>
  </g>
  <g transform="translate(230, 560)" opacity="0.3">
    <rect width="30" height="20" rx="3" fill="#30363d"/>
  </g>
  <text x="140" y="565" font-family="system-ui" font-size="11" fill="#8b949e">12 个 Docker 容器 · 全栈部署</text>

  <!-- Version / date -->
  <text x="1140" y="610" font-family="monospace" font-size="12" fill="#30363d" text-anchor="end">2026</text>
</svg>
