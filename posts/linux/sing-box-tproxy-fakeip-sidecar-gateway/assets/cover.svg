<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">sing-box FakeIP TProxy sidecar gateway cover</title>
  <desc id="desc">RouterOS sends LAN traffic to a sing-box sidecar gateway using FakeIP and TProxy.</desc>
  <rect width="1280" height="720" fill="#101820"/>
  <rect x="70" y="96" width="270" height="150" rx="8" fill="#f2f5f8"/>
  <rect x="490" y="96" width="300" height="150" rx="8" fill="#f2f5f8"/>
  <rect x="930" y="96" width="250" height="150" rx="8" fill="#f2f5f8"/>
  <rect x="370" y="430" width="540" height="160" rx="8" fill="#f2f5f8"/>
  <text x="105" y="158" fill="#172033" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="34" font-weight="700">LAN</text>
  <text x="105" y="204" fill="#50627d" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="23">clients</text>
  <text x="530" y="158" fill="#172033" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="34" font-weight="700">RouterOS</text>
  <text x="530" y="204" fill="#50627d" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="23">policy route</text>
  <text x="965" y="158" fill="#172033" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="34" font-weight="700">Proxy</text>
  <text x="965" y="204" fill="#50627d" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="23">outbounds</text>
  <text x="415" y="500" fill="#172033" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="36" font-weight="700">sing-box</text>
  <text x="415" y="546" fill="#50627d" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24">DNS FakeIP + nft TProxy :9888</text>
