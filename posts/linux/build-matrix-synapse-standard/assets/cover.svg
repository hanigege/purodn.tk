<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e" />
      <stop offset="50%" style="stop-color:#16213e" />
      <stop offset="100%" style="stop-color:#0f3460" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff" />
      <stop offset="100%" style="stop-color:#3a7bd5" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="16" />
  <!-- 装饰网格 -->
  <g opacity="0.05" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80" />
    <line x1="0" y1="160" x2="800" y2="160" />
    <line x1="0" y1="240" x2="800" y2="240" />
    <line x1="0" y1="320" x2="800" y2="320" />
    <line x1="160" y1="0" x2="160" y2="400" />
    <line x1="320" y1="0" x2="320" y2="400" />
    <line x1="480" y1="0" x2="480" y2="400" />
    <line x1="640" y1="0" x2="640" y2="400" />
  </g>
  <!-- 矩阵图标 -->
  <g transform="translate(80,80)" opacity="0.15">
    <rect width="40" height="40" fill="none" stroke="#00d2ff" stroke-width="2" rx="4" />
    <rect width="12" height="12" fill="#00d2ff" rx="2" />
  </g>
  <!-- 标题 -->
  <text x="80" y="160" fill="url(#accent)" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="bold">
    从零搭建
  </text>
  <text x="80" y="210" fill="#ffffff" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="bold">
    Matrix Synapse
  </text>
  <text x="80" y="260" fill="#e0e0e0" font-family="system-ui,-apple-system,sans-serif" font-size="28">
    即时通讯服务器
  </text>
  <!-- 副标题 -->
  <rect x="80" y="290" width="280" height="2" fill="url(#accent)" />
  <text x="80" y="320" fill="#a0a0a0" font-family="system-ui,-apple-system,sans-serif" font-size="16">
    标准网络版 · 小白手搓教程
  </text>
  <!-- 右侧装饰 -->
  <g transform="translate(600,100)" opacity="0.1">
    <text font-size="120" fill="#00d2ff" font-family="monospace">&lt;/&gt;</text>
  </g>
  <!-- 底部标注 -->
  <text x="80" y="370" fill="#606060" font-family="system-ui,-apple-system,sans-serif" font-size="12">
    Docker · Synapse · LiveKit · Element · Coturn · NPM
  </text>
</svg>
