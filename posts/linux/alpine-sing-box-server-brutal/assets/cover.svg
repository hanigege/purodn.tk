    <path d="M20 412 L188 112 L274 258 L340 164 L514 412 Z" fill="#7bd0e6" opacity="0.95"/>
    <path d="M84 412 L188 236 L250 340 L296 276 L416 412 Z" fill="#f8fbff" opacity="0.96"/>
    <path d="M146 302 L188 112 L274 258 L252 262 L224 222 L190 288 Z" fill="#173d4b" opacity="0.18"/>
    <rect x="66" y="446" width="408" height="62" rx="31" fill="#ffffff" opacity="0.12"/>
    <text x="100" y="486" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#f8fbff">Alpine + sing-box</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="548" y="96" width="594" height="448" rx="28" fill="url(#panel)"/>
    <rect x="580" y="132" width="530" height="54" rx="12" fill="#14313c"/>
    <circle cx="610" cy="159" r="8" fill="#f05d5e"/>
    <circle cx="638" cy="159" r="8" fill="#f7c948"/>
    <circle cx="666" cy="159" r="8" fill="#47c78e"/>

    <text x="606" y="238" font-family="Menlo, Consolas, monospace" font-size="27" fill="#16313b">apk add --repository edge/community sing-box</text>
    <text x="606" y="292" font-family="Menlo, Consolas, monospace" font-size="29" fill="#16313b">sing-box generate reality-keypair</text>
    <text x="606" y="346" font-family="Menlo, Consolas, monospace" font-size="29" fill="#16313b">make load brutal.ko</text>

    <rect x="606" y="402" width="158" height="48" rx="24" fill="#2d8cff"/>
    <text x="636" y="434" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="700" fill="#fff">Reality</text>
    <rect x="788" y="402" width="156" height="48" rx="24" fill="#18a67a"/>
    <text x="822" y="434" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="700" fill="#fff">VLESS</text>
    <rect x="968" y="402" width="122" height="48" rx="24" fill="#f0a83a"/>
    <text x="994" y="434" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="700" fill="#1c2a2f">443</text>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M374 300 C448 212 502 204 548 236" stroke="#ffd166" stroke-width="10"/>
    <path d="M374 358 C452 450 502 462 548 430" stroke="#7ce7c7" stroke-width="10"/>
    <path d="M396 329 L526 329" stroke="#ffffff" stroke-width="7" opacity="0.72"/>
