<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Alpine sing-box Reality tcp-brutal cover</title>
  <desc id="desc">A technical cover showing Alpine Linux, Edge community install, sing-box Reality, generated keys, and tcp-brutal acceleration.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10212a"/>
      <stop offset="0.5" stop-color="#14384a"/>
      <stop offset="1" stop-color="#133329"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#dcecf2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#031014" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <path d="M0 586 C170 526 294 644 456 574 C608 508 726 504 884 584 C1044 664 1134 532 1280 574 L1280 720 L0 720 Z" fill="#6fcfb6" opacity="0.18"/>

