<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">SoftEther 搭配 VPS 搭建 VLAN 联机环境</title>
  <desc id="desc">深色网络拓扑风格封面，展示玩家设备通过 SoftEther 连接到 VPS 上的虚拟 LAN。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071225"/>
      <stop offset="0.52" stop-color="#0b1b33"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.42"/>
      <stop offset="0.58" stop-color="#2563eb" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.34"/>
      <stop offset="0.62" stop-color="#10b981" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10213f"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.55" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#93c5fd" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <circle cx="240" cy="168" r="230" fill="url(#glowBlue)"/>
  <circle cx="920" cy="486" r="260" fill="url(#glowGreen)"/>
  <path d="M70 555 C235 430 360 612 520 470 S825 355 1135 438" fill="none" stroke="#38bdf8" stroke-opacity="0.14" stroke-width="3"/>
  <path d="M72 580 C250 475 380 635 540 510 S830 410 1130 480" fill="none" stroke="#34d399" stroke-opacity="0.12" stroke-width="2"/>

  <g filter="url(#shadow)">
    <rect x="88" y="74" width="1024" height="527" rx="34" fill="#07111f" fill-opacity="0.70" stroke="#1e3a5f"/>
    <rect x="111" y="96" width="978" height="483" rx="27" fill="none" stroke="#60a5fa" stroke-opacity="0.14"/>
  </g>

  <!-- Topology lines -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M314 367 C430 302 505 283 594 303" stroke="#38bdf8" stroke-width="5" stroke-opacity="0.72"/>
    <path d="M886 367 C770 302 695 283 606 303" stroke="#38bdf8" stroke-width="5" stroke-opacity="0.72"/>
    <path d="M314 367 C463 445 737 445 886 367" stroke="#34d399" stroke-width="5" stroke-opacity="0.82"/>
    <path d="M600 306 L600 210" stroke="#a78bfa" stroke-width="5" stroke-opacity="0.75"/>
  </g>
  <g stroke="#e0f2fe" stroke-opacity="0.42" stroke-width="1.4" stroke-dasharray="8 12" fill="none">
    <path d="M314 367 C430 302 505 283 594 303"/>
    <path d="M886 367 C770 302 695 283 606 303"/>
    <path d="M314 367 C463 445 737 445 886 367"/>
  </g>

  <!-- VPS / SoftEther node -->
  <g transform="translate(494 170)" filter="url(#shadow)">
    <rect x="0" y="0" width="212" height="164" rx="24" fill="url(#panel)" stroke="#60a5fa" stroke-opacity="0.75"/>
    <rect x="28" y="34" width="156" height="20" rx="10" fill="#1e293b" stroke="#475569"/>
    <rect x="28" y="72" width="156" height="20" rx="10" fill="#1e293b" stroke="#475569"/>
    <rect x="28" y="110" width="156" height="20" rx="10" fill="#1e293b" stroke="#475569"/>
    <circle cx="50" cy="44" r="5" fill="#34d399" filter="url(#softGlow)"/>
    <circle cx="50" cy="82" r="5" fill="#22d3ee" filter="url(#softGlow)"/>
    <circle cx="50" cy="120" r="5" fill="#f59e0b"/>
    <text x="106" y="151" text-anchor="middle" font-family="Inter, 'Noto Sans SC', Arial, sans-serif" font-size="18" font-weight="700" fill="#dbeafe">VPS</text>
  </g>

  <!-- Virtual LAN ring -->
  <g transform="translate(414 298)">
    <rect x="0" y="0" width="372" height="142" rx="34" fill="#082f49" fill-opacity="0.72" stroke="#22d3ee" stroke-opacity="0.8"/>
    <rect x="20" y="20" width="332" height="102" rx="26" fill="#0f172a" fill-opacity="0.55" stroke="#34d399" stroke-opacity="0.45" stroke-dasharray="7 8"/>
    <text x="186" y="62" text-anchor="middle" font-family="Inter, 'Noto Sans SC', Arial, sans-serif" font-size="25" font-weight="800" fill="#ecfeff">SoftEther Virtual Hub</text>
    <text x="186" y="98" text-anchor="middle" font-family="Inter, 'Noto Sans SC', Arial, sans-serif" font-size="18" fill="#a7f3d0">VLAN / SecureNAT / Bridge</text>
  </g>

  <!-- Left gaming client -->
  <g transform="translate(172 330)" filter="url(#shadow)">
    <rect x="0" y="0" width="190" height="124" rx="22" fill="#0f172a" stroke="#38bdf8" stroke-opacity="0.68"/>
    <rect x="34" y="26" width="122" height="66" rx="8" fill="#020617" stroke="#64748b"/>
    <rect x="71" y="96" width="48" height="10" rx="5" fill="#475569"/>
    <path d="M48 58 h22 m-11 -11 v22" stroke="#34d399" stroke-width="6" stroke-linecap="round"/>
    <circle cx="127" cy="53" r="7" fill="#60a5fa"/>
    <circle cx="145" cy="67" r="7" fill="#f472b6"/>
    <text x="95" y="151" text-anchor="middle" font-family="Inter, 'Noto Sans SC', Arial, sans-serif" font-size="17" font-weight="700" fill="#bfdbfe">Player A</text>
  </g>

  <!-- Right gaming client -->
  <g transform="translate(838 330)" filter="url(#shadow)">
    <rect x="0" y="0" width="190" height="124" rx="22" fill="#0f172a" stroke="#34d399" stroke-opacity="0.68"/>
    <rect x="34" y="26" width="122" height="66" rx="8" fill="#020617" stroke="#64748b"/>
    <path d="M48 58 h22 m-11 -11 v22" stroke="#34d399" stroke-width="6" stroke-linecap="round"/>
    <circle cx="127" cy="53" r="7" fill="#60a5fa"/>
    <circle cx="145" cy="67" r="7" fill="#f472b6"/>
    <rect x="71" y="96" width="48" height="10" rx="5" fill="#475569"/>
    <text x="95" y="151" text-anchor="middle" font-family="Inter, 'Noto Sans SC', Arial, sans-serif" font-size="17" font-weight="700" fill="#bbf7d0">Player B</text>
  </g>

  <!-- Lock + tunnel label -->
  <g transform="translate(543 463)">
    <rect x="0" y="0" width="114" height="48" rx="24" fill="url(#accent)" opacity="0.95"/>
    <path d="M43 23 v-7 a14 14 0 0 1 28 0 v7" fill="none" stroke="#082f49" stroke-width="5" stroke-linecap="round"/>
    <rect x="38" y="22" width="38" height="22" rx="6" fill="#082f49"/>
    <circle cx="57" cy="32" r="3.2" fill="#a7f3d0"/>
  </g>

  <!-- Title -->
  <g font-family="Inter, 'Noto Sans SC', 'Microsoft YaHei', Arial, sans-serif">
    <text x="600" y="92" text-anchor="middle" font-size="43" font-weight="900" fill="#f8fafc" letter-spacing="0.5">SoftEther + VPS</text>
    <text x="600" y="138" text-anchor="middle" font-size="30" font-weight="800" fill="#bae6fd">搭建 VLAN 联机环境</text>
    <text x="600" y="548" text-anchor="middle" font-size="21" font-weight="600" fill="#cbd5e1">把分散玩家接入同一个私有虚拟局域网</text>
    <text x="600" y="579" text-anchor="middle" font-size="16" fill="#7dd3fc">TCP 5555 · Virtual Hub · SecureNAT · Game LAN</text>
  </g>

  <g opacity="0.84">
    <circle cx="314" cy="367" r="8" fill="#38bdf8" filter="url(#softGlow)"/>
    <circle cx="600" cy="306" r="8" fill="#a78bfa" filter="url(#softGlow)"/>
    <circle cx="886" cy="367" r="8" fill="#34d399" filter="url(#softGlow)"/>
  </g>
</svg>
