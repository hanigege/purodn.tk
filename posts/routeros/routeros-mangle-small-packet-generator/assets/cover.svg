<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">RouterOS Mangle 小包优先与 Queue Tree</title>
  <desc id="desc">RouterOS 流量标记、队列树和带宽生成器的封面图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="0.55" stop-color="#17324a"/>
      <stop offset="1" stop-color="#1f4d3a"/>
    </linearGradient>
    <linearGradient id="lane" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#69d2ff"/>
      <stop offset="1" stop-color="#7ff0a5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.16" stroke="#ffffff" stroke-width="2">
    <path d="M0 110H1200M0 230H1200M0 350H1200M0 470H1200"/>
    <path d="M160 0V630M360 0V630M560 0V630M760 0V630M960 0V630"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="110" y="120" width="980" height="390" rx="28" fill="#f7fbff"/>
    <rect x="150" y="165" width="275" height="300" rx="20" fill="#102033"/>
    <text x="188" y="218" fill="#83e2ff" font-family="Menlo, Consolas, monospace" font-size="30" font-weight="700">mangle</text>
    <text x="188" y="270" fill="#ffffff" font-family="Menlo, Consolas, monospace" font-size="22">dns</text>
    <text x="188" y="315" fill="#ffffff" font-family="Menlo, Consolas, monospace" font-size="22">small-packet</text>
    <text x="188" y="360" fill="#ffffff" font-family="Menlo, Consolas, monospace" font-size="22">medium-packet</text>
    <text x="188" y="405" fill="#ffffff" font-family="Menlo, Consolas, monospace" font-size="22">large-packet</text>
    <path d="M455 230C535 230 545 230 625 230" stroke="url(#lane)" stroke-width="18" stroke-linecap="round"/>
    <path d="M455 315C535 315 545 315 625 315" stroke="url(#lane)" stroke-width="12" stroke-linecap="round" opacity="0.78"/>
    <path d="M455 400C535 400 545 400 625 400" stroke="url(#lane)" stroke-width="8" stroke-linecap="round" opacity="0.58"/>
    <polygon points="630,230 600,210 600,250" fill="#7ff0a5"/>
    <polygon points="630,315 604,298 604,332" fill="#7ff0a5" opacity="0.78"/>
    <polygon points="630,400 608,386 608,414" fill="#7ff0a5" opacity="0.58"/>
    <rect x="665" y="165" width="365" height="300" rx="20" fill="#ffffff" stroke="#d4e2ef" stroke-width="2"/>
    <text x="705" y="218" fill="#17324a" font-family="Menlo, Consolas, monospace" font-size="30" font-weight="700">queue tree</text>
    <rect x="705" y="255" width="245" height="38" rx="8" fill="#e7f5ff"/>
    <rect x="705" y="312" width="185" height="38" rx="8" fill="#eafaf0"/>
    <rect x="705" y="369" width="285" height="38" rx="8" fill="#fff3df"/>
    <text x="725" y="281" fill="#17324a" font-family="Menlo, Consolas, monospace" font-size="20">priority 1: DNS</text>
    <text x="725" y="338" fill="#17324a" font-family="Menlo, Consolas, monospace" font-size="20">priority 2: small</text>
    <text x="725" y="395" fill="#17324a" font-family="Menlo, Consolas, monospace" font-size="20">priority 8: bulk</text>
  </g>
  <text x="110" y="570" fill="#ffffff" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="40" font-weight="800">RouterOS 小包优先规则与带宽生成器</text>
</svg>
