<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">FreeBSD 15 Xray Reality sing-box</title>
  <desc id="desc">FreeBSD 15 server running Xray VLESS Reality Vision on TCP 443 for sing-box clients.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.52" stop-color="#233047"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.14" stroke="#e5e7eb" stroke-width="1">
    <path d="M0 120h1200M0 240h1200M0 360h1200M0 480h1200"/>
    <path d="M120 0v630M300 0v630M480 0v630M660 0v630M840 0v630M1020 0v630"/>
  </g>
  <g fill="none" stroke="url(#accent)" stroke-width="9" stroke-linecap="round">
    <path d="M210 330 C330 230 455 230 575 330 S820 430 950 330"/>
    <path d="M920 300 L958 330 L920 360"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="82" y="190" width="260" height="250" rx="20" fill="#f8fafc"/>
    <rect x="470" y="190" width="260" height="250" rx="20" fill="#f8fafc"/>
    <rect x="858" y="190" width="260" height="250" rx="20" fill="#f8fafc"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <text x="212" y="262" font-size="30" font-weight="850" fill="#991b1b">FreeBSD 15</text>
    <text x="212" y="310" font-size="23" font-weight="700" fill="#334155">rc.d service</text>
    <text x="212" y="354" font-size="21" fill="#475569">kernel tuning</text>
    <text x="600" y="262" font-size="30" font-weight="850" fill="#0f172a">Xray 443</text>
    <text x="600" y="310" font-size="23" font-weight="700" fill="#334155">VLESS Reality</text>
    <text x="600" y="354" font-size="21" fill="#475569">Vision TCP</text>
    <text x="988" y="262" font-size="30" font-weight="850" fill="#0f172a">sing-box</text>
    <text x="988" y="310" font-size="23" font-weight="700" fill="#334155">direct route</text>
    <text x="988" y="354" font-size="21" fill="#475569">selector node</text>
  </g>
  <g font-family="Inter, Arial, sans-serif" fill="#f8fafc">
    <text x="80" y="86" font-size="43" font-weight="850">FreeBSD 15 Xray Reality</text>
    <text x="80" y="132" font-size="26" fill="#cbd5e1">TCP 443 production node for sing-box routing</text>
  </g>
</svg>
