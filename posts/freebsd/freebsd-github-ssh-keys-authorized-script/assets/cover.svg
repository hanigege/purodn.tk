<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">FreeBSD GitHub SSH keys authorized_keys cover</title>
  <desc id="desc">A FreeBSD themed cover showing GitHub public keys flowing into an authorized_keys file.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="0.55" stop-color="#17242f"/>
      <stop offset="1" stop-color="#23343d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f2b84b"/>
      <stop offset="1" stop-color="#d9483f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="58" y="58" width="1084" height="514" rx="30" fill="#0d141b" stroke="#2c4652" stroke-width="2" filter="url(#shadow)"/>

  <g transform="translate(98 106)">
    <circle cx="88" cy="88" r="76" fill="#d9483f"/>
    <circle cx="64" cy="58" r="20" fill="#ffffff"/>
    <circle cx="112" cy="58" r="20" fill="#ffffff"/>
    <path d="M45 111c20 26 66 26 86 0" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
    <path d="M28 29L2 2M148 29l26-27" stroke="#d9483f" stroke-width="18" stroke-linecap="round"/>
  </g>

  <g transform="translate(355 116)" font-family="Arial, 'Noto Sans CJK SC', sans-serif">
    <text x="0" y="48" fill="#ffffff" font-size="48" font-weight="700">FreeBSD SSH 公钥导入</text>
    <text x="0" y="104" fill="#d7e4e8" font-size="30">从 GitHub 拉取公钥并写入 authorized_keys</text>
  </g>

  <g transform="translate(132 318)" font-family="Menlo, Consolas, monospace">
    <rect x="0" y="0" width="936" height="150" rx="16" fill="#14222b" stroke="#395665"/>
    <text x="34" y="48" fill="#f2b84b" font-size="25">fetch https://github.com/&lt;user&gt;.keys</text>
    <text x="34" y="92" fill="#9edbd0" font-size="25">cat keys &gt;&gt; ~/.ssh/authorized_keys</text>
    <text x="34" y="136" fill="#d7e4e8" font-size="25">PasswordAuthentication no · PubkeyAuthentication yes</text>
  </g>

  <g transform="translate(132 510)" font-family="Arial, 'Noto Sans CJK SC', sans-serif">
    <rect x="0" y="-34" width="250" height="48" rx="24" fill="url(#accent)"/>
    <text x="28" y="-2" fill="#ffffff" font-size="24" font-weight="700">FreeBSD 专用版</text>
  </g>
</svg>
