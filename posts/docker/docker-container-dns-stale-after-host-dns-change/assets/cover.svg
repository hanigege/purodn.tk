<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Docker DNS stale cache troubleshooting</title>
  <desc id="desc">A dark technical cover showing Docker containers keeping an old DNS server until they are recreated.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0c2238"/>
      <stop offset="1" stop-color="#102b22"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12324f"/>
      <stop offset="1" stop-color="#0b1828"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#5eead4"/>
    </marker>
    <marker id="warnArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#f97316"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1060" cy="92" r="160" fill="#22c55e" opacity="0.08"/>
  <circle cx="130" cy="540" r="220" fill="#38bdf8" opacity="0.08"/>

  <text x="72" y="95" fill="#e5f4ff" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="44" font-weight="800">Docker 容器 DNS 旧值残留</text>
  <text x="74" y="137" fill="#9cc4dd" font-family="Inter, system-ui, sans-serif" font-size="22">宿主机 DNS 已切换，但旧容器仍指向旧 nameserver</text>

  <g filter="url(#shadow)">
    <rect x="72" y="190" width="280" height="250" rx="24" fill="url(#panel)" stroke="#2dd4bf" stroke-opacity="0.45"/>
    <text x="112" y="245" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700">Host</text>
    <text x="112" y="292" fill="#a7f3d0" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">/etc/resolv.conf</text>
    <rect x="112" y="320" width="198" height="46" rx="10" fill="#062b24" stroke="#34d399" stroke-opacity="0.55"/>
    <text x="132" y="350" fill="#bbf7d0" font-family="JetBrains Mono, ui-monospace, monospace" font-size="20">10.20.20.12</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="460" y="172" width="300" height="290" rx="26" fill="#0b1726" stroke="#60a5fa" stroke-opacity="0.45"/>
    <text x="505" y="228" fill="#eff6ff" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="800">Docker</text>
    <rect x="506" y="265" width="208" height="58" rx="14" fill="#082f49" stroke="#38bdf8" stroke-opacity="0.55"/>
    <text x="530" y="301" fill="#bae6fd" font-family="JetBrains Mono, ui-monospace, monospace" font-size="20">127.0.0.11</text>
    <text x="500" y="365" fill="#fecaca" font-family="JetBrains Mono, ui-monospace, monospace" font-size="20">ExtServers: old</text>
    <text x="500" y="399" fill="#fb923c" font-family="JetBrains Mono, ui-monospace, monospace" font-size="20">10.20.20.6</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="850" y="190" width="280" height="250" rx="24" fill="url(#panel)" stroke="#f97316" stroke-opacity="0.55"/>
    <text x="892" y="245" fill="#fff7ed" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700">Containers</text>
    <text x="892" y="294" fill="#fed7aa" font-family="JetBrains Mono, ui-monospace, monospace" font-size="22">ntfy</text>
    <text x="892" y="329" fill="#fed7aa" font-family="JetBrains Mono, ui-monospace, monospace" font-size="22">matrix-synapse</text>
    <rect x="892" y="357" width="188" height="46" rx="10" fill="#3b1607" stroke="#fb923c" stroke-opacity="0.65"/>
    <text x="913" y="387" fill="#ffedd5" font-family="JetBrains Mono, ui-monospace, monospace" font-size="19">stale DNS</text>
  </g>

  <line x1="352" y1="315" x2="450" y2="315" stroke="#5eead4" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="760" y1="315" x2="838" y2="315" stroke="#f97316" stroke-width="5" stroke-dasharray="12 10" marker-end="url(#warnArrow)"/>

  <g transform="translate(193 492)">
    <rect x="0" y="0" width="814" height="72" rx="20" fill="#061827" stroke="#38bdf8" stroke-opacity="0.38"/>
    <text x="35" y="45" fill="#e0f2fe" font-family="JetBrains Mono, ui-monospace, monospace" font-size="23">docker compose up -d --force-recreate SERVICE</text>
  </g>

  <text x="72" y="592" fill="#7dd3fc" font-family="Inter, system-ui, sans-serif" font-size="18">Fix: recreate containers after host DNS / gateway migration</text>
</svg>
