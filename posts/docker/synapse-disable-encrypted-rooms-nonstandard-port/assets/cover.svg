<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Synapse disabled encrypted rooms cover</title>
  <desc id="desc">A Matrix Synapse server on a non-standard HTTPS port blocks room encryption events.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10233f"/>
      <stop offset="52%" stop-color="#19666b"/>
      <stop offset="100%" stop-color="#e8b54f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#07121f" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <path d="M0 482 C128 438 260 520 408 474 C570 424 664 336 836 378 C1008 420 1096 502 1200 448 L1200 630 L0 630 Z" fill="#ffffff" opacity="0.14"/>
  <g transform="translate(96 96)" filter="url(#shadow)">
    <rect x="0" y="0" width="462" height="414" rx="22" fill="#f7fbff"/>
    <rect x="36" y="44" width="390" height="68" rx="14" fill="#e7eff6"/>
    <text x="62" y="87" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="26" font-weight="700" fill="#17324c">matrix.example.com:12335</text>
    <rect x="36" y="148" width="178" height="74" rx="14" fill="#d9f3e5"/>
    <text x="62" y="195" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#116b47">default off</text>
    <rect x="248" y="148" width="178" height="74" rx="14" fill="#ffe1dc"/>
    <text x="274" y="195" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#b63a32">403</text>
    <rect x="36" y="262" width="390" height="64" rx="14" fill="#17324c"/>
    <circle cx="70" cy="294" r="11" fill="#28b27a"/>
    <text x="96" y="303" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" fill="#f7fbff">m.room.encryption</text>
  </g>
  <g transform="translate(706 116)" filter="url(#shadow)">
    <rect x="0" y="0" width="300" height="282" rx="28" fill="#f7fbff"/>
    <path d="M78 126 V82 C78 45 106 22 150 22 C194 22 222 45 222 82 V126" fill="none" stroke="#17324c" stroke-width="28" stroke-linecap="round"/>
    <rect x="58" y="120" width="184" height="126" rx="22" fill="#17324c"/>
    <circle cx="150" cy="178" r="19" fill="#e8b54f"/>
    <rect x="142" y="196" width="16" height="30" rx="8" fill="#e8b54f"/>
    <path d="M42 44 L258 248" stroke="#d84f45" stroke-width="24" stroke-linecap="round"/>
  </g>
  <g transform="translate(650 464)">
    <rect x="0" y="0" width="438" height="62" rx="16" fill="#081e31" opacity="0.8"/>
    <text x="32" y="40" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="25" fill="#f7fbff">server-side policy module</text>
  </g>
  <text x="96" y="568" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#f7fbff">Matrix Synapse</text>
  <text x="96" y="604" font-family="Inter, Arial, sans-serif" font-size="20" fill="#f7fbff" opacity="0.86">Disable new encrypted rooms on a non-standard client port</text>
