<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Worker versus Tunnel decision diagram</title>
  <desc id="desc">Diagram comparing Cloudflare Worker for well-known announcement and Cloudflare Tunnel for full HTTP/WebSocket forwarding.</desc>
  <rect width="1280" height="760" fill="#f8fafc"/>
  <text x="80" y="96" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#0f172a">Worker 和 Tunnel 二选一怎么用</text>
  <g transform="translate(78 150)">
    <rect x="0" y="0" width="526" height="490" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="3"/>
    <text x="34" y="58" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800" fill="#155e75">推荐：Worker</text>
    <text x="34" y="104" font-family="Inter, Arial, sans-serif" font-size="21" fill="#0f766e">只解决标准 443 的公告</text>
    <rect x="34" y="146" width="458" height="76" rx="8" fill="#ffffff"/>
    <text x="58" y="194" font-family="Menlo, Consolas, monospace" font-size="20" fill="#155e75">/.well-known/matrix/client</text>
    <rect x="34" y="252" width="458" height="150" rx="8" fill="#ffffff"/>
    <text x="58" y="294" font-family="Inter, Arial, sans-serif" font-size="20" fill="#334155">实际服务仍走非标准端口：</text>
    <text x="58" y="334" font-family="Menlo, Consolas, monospace" font-size="19" fill="#155e75">matrix.example.com:12335</text>
    <text x="58" y="368" font-family="Menlo, Consolas, monospace" font-size="19" fill="#155e75">jwt.example.com:12336</text>
    <text x="58" y="402" font-family="Menlo, Consolas, monospace" font-size="19" fill="#155e75">livekit.example.com:12337</text>
    <text x="34" y="458" font-family="Inter, Arial, sans-serif" font-size="20" fill="#0f766e">适合：本地无 443，但端口转发可用</text>
  </g>
  <g transform="translate(676 150)">
    <rect x="0" y="0" width="526" height="490" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="3"/>
    <text x="34" y="58" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800" fill="#9a3412">可选：Tunnel</text>
    <text x="34" y="104" font-family="Inter, Arial, sans-serif" font-size="21" fill="#9a3412">接管 HTTP / WebSocket 入口</text>
    <rect x="34" y="146" width="458" height="150" rx="8" fill="#ffffff"/>
    <text x="58" y="188" font-family="Menlo, Consolas, monospace" font-size="19" fill="#9a3412">matrix -> 10.20.20.8:8008</text>
    <text x="58" y="222" font-family="Menlo, Consolas, monospace" font-size="19" fill="#9a3412">jwt    -> 10.20.20.8:8170</text>
    <text x="58" y="256" font-family="Menlo, Consolas, monospace" font-size="19" fill="#9a3412">livekit-> 10.20.20.8:7880</text>
    <rect x="34" y="326" width="458" height="76" rx="8" fill="#ffffff"/>
    <text x="58" y="374" font-family="Inter, Arial, sans-serif" font-size="20" fill="#334155">UDP 媒体端口仍不能靠 Tunnel 解决</text>
    <text x="34" y="458" font-family="Inter, Arial, sans-serif" font-size="20" fill="#9a3412">适合：不想暴露 Web 入口端口</text>
  </g>
  <text x="80" y="704" font-family="Inter, Arial, sans-serif" font-size="22" fill="#334155">无论选哪种，LiveKit 的 17882/tcp 与 50201-50400/udp 都要单独处理。</text>
</svg>
