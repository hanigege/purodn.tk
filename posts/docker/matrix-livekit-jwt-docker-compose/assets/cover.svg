<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Cloudflare Tunnel Matrix LiveKit routes</title>
  <desc id="desc">Cloudflare Tunnel public hostname routes for Matrix Synapse, well-known, LiveKit, JWT service, and ntfy without Nginx Proxy Manager.</desc>
  <rect width="1200" height="630" fill="#f8fafc"/>
  <rect x="0" y="0" width="1200" height="630" fill="#ecfeff"/>
  <g opacity="0.16">
    <path d="M0 126H1200M0 252H1200M0 378H1200M0 504H1200" stroke="#0891b2" stroke-width="2"/>
    <path d="M150 0V630M330 0V630M510 0V630M690 0V630M870 0V630M1050 0V630" stroke="#0f766e" stroke-width="2"/>
  </g>

  <g transform="translate(72 70)">
    <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="28" fill="#0f766e" font-weight="800">Cloudflare Tunnel</text>
    <text x="0" y="58" font-family="Inter, Arial, sans-serif" font-size="50" fill="#134e4a" font-weight="900">Matrix LiveKit 免 NPM</text>
    <text x="0" y="104" font-family="Inter, Arial, sans-serif" font-size="30" fill="#155e75" font-weight="700">Public Hostname routes -> Docker host 10.20.20.8</text>
  </g>

  <g transform="translate(72 210)">
    <rect x="0" y="0" width="1056" height="296" rx="10" fill="#ffffff" stroke="#0f766e" stroke-width="3"/>
    <rect x="0" y="0" width="1056" height="54" rx="10" fill="#134e4a"/>
    <text x="34" y="36" font-family="Inter, Arial, sans-serif" font-size="22" fill="#ecfeff" font-weight="800">Hostname</text>
    <text x="390" y="36" font-family="Inter, Arial, sans-serif" font-size="22" fill="#ecfeff" font-weight="800">Path</text>
    <text x="578" y="36" font-family="Inter, Arial, sans-serif" font-size="22" fill="#ecfeff" font-weight="800">Service</text>
    <text x="846" y="36" font-family="Inter, Arial, sans-serif" font-size="22" fill="#ecfeff" font-weight="800">Target</text>

    <g font-family="Menlo, Consolas, monospace" font-size="21" fill="#0f172a">
      <rect x="0" y="54" width="1056" height="48" fill="#f8fafc"/>
      <text x="34" y="86">666666.xyz</text>
      <text x="390" y="86">/.well-known</text>
      <text x="578" y="86">well-known</text>
      <text x="846" y="86">10.20.20.8:8899</text>

      <rect x="0" y="102" width="1056" height="48" fill="#ecfeff"/>
      <text x="34" y="134">666666.xyz</text>
      <text x="390" y="134">*</text>
      <text x="578" y="134">synapse</text>
      <text x="846" y="134">10.20.20.8:8008</text>

      <rect x="0" y="150" width="1056" height="48" fill="#f8fafc"/>
      <text x="34" y="182">livekit.666666.xyz</text>
      <text x="390" y="182">*</text>
      <text x="578" y="182">livekit</text>
      <text x="846" y="182">10.20.20.8:7880</text>

      <rect x="0" y="198" width="1056" height="48" fill="#ecfeff"/>
      <text x="34" y="230">matrix-jwt.666666.xyz</text>
      <text x="390" y="230">*</text>
      <text x="578" y="230">jwt-service</text>
      <text x="846" y="230">10.20.20.8:8170</text>

      <rect x="0" y="246" width="1056" height="50" fill="#f8fafc"/>
      <text x="34" y="278">sms.666666.xyz</text>
      <text x="390" y="278">*</text>
      <text x="578" y="278">ntfy</text>
      <text x="846" y="278">10.20.20.8:80</text>
    </g>
  </g>

  <g transform="translate(72 536)">
    <rect x="0" y="0" width="1056" height="54" rx="9" fill="#0f172a"/>
    <text x="28" y="35" font-family="Inter, Arial, sans-serif" font-size="22" fill="#d9f99d" font-weight="800">UDP media stays outside Tunnel:</text>
    <text x="390" y="35" font-family="Menlo, Consolas, monospace" font-size="20" fill="#e0f2fe">LiveKit 50201-50400/udp  |  coturn 50000-50200/udp</text>
  </g>
</svg>
