<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Cloudflare Public Hostnames mapping</title>
  <desc id="desc">Illustration of three Cloudflare Tunnel Public Hostname records for Matrix, JWT, and LiveKit.</desc>
  <rect width="1280" height="760" fill="#f8fafc"/>
  <rect x="56" y="54" width="1168" height="652" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="96" y="116" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800" fill="#0f172a">Public Hostnames</text>
  <text x="96" y="154" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Tunnel 内添加三条公网域名到内网服务的映射</text>
  <rect x="96" y="206" width="1088" height="72" rx="8" fill="#0f172a"/>
  <text x="126" y="251" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#e2e8f0">Subdomain</text>
  <text x="322" y="251" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#e2e8f0">Domain</text>
  <text x="510" y="251" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#e2e8f0">Type</text>
  <text x="654" y="251" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#e2e8f0">URL</text>
  <g font-family="Menlo, Consolas, monospace" font-size="21">
    <rect x="96" y="300" width="1088" height="86" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <text x="126" y="352" fill="#155e75">matrix</text>
    <text x="322" y="352" fill="#155e75">example.com</text>
    <text x="510" y="352" fill="#155e75">HTTP</text>
    <text x="654" y="352" fill="#155e75">10.20.20.8:8008</text>
    <rect x="96" y="410" width="1088" height="86" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="126" y="462" fill="#166534">jwt</text>
    <text x="322" y="462" fill="#166534">example.com</text>
    <text x="510" y="462" fill="#166534">HTTP</text>
    <text x="654" y="462" fill="#166534">10.20.20.8:8170</text>
    <rect x="96" y="520" width="1088" height="86" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="126" y="572" fill="#9a3412">livekit</text>
    <text x="322" y="572" fill="#9a3412">example.com</text>
    <text x="510" y="572" fill="#9a3412">HTTP</text>
    <text x="654" y="572" fill="#9a3412">10.20.20.8:7880</text>
  </g>
  <text x="96" y="660" font-family="Inter, Arial, sans-serif" font-size="22" fill="#334155">保存后访问 https://matrix.example.com、https://jwt.example.com、https://livekit.example.com</text>
</svg>
