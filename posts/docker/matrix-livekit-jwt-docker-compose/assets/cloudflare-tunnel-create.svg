<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Cloudflare Tunnel create flow</title>
  <desc id="desc">Illustration of Cloudflare Zero Trust navigation to create a cloudflared tunnel.</desc>
  <rect width="1280" height="760" fill="#f8fafc"/>
  <rect x="48" y="46" width="1184" height="668" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="48" y="46" width="268" height="668" rx="10" fill="#0f172a"/>
  <text x="82" y="100" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#f8fafc">Cloudflare</text>
  <text x="82" y="146" font-family="Inter, Arial, sans-serif" font-size="18" fill="#94a3b8">Zero Trust</text>
  <g font-family="Inter, Arial, sans-serif" font-size="20">
    <text x="82" y="218" fill="#cbd5e1">Access</text>
    <text x="82" y="268" fill="#cbd5e1">Gateway</text>
    <rect x="68" y="304" width="220" height="48" rx="7" fill="#164e63"/>
    <text x="82" y="335" fill="#e0f2fe" font-weight="700">Networks</text>
    <text x="104" y="392" fill="#67e8f9" font-weight="700">Tunnels</text>
  </g>
  <g transform="translate(360 104)">
    <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">创建 Cloudflare Tunnel</text>
    <text x="0" y="44" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Zero Trust -> Networks -> Tunnels -> Create a tunnel</text>
    <rect x="0" y="94" width="802" height="82" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <text x="28" y="146" font-family="Inter, Arial, sans-serif" font-size="24" fill="#155e75" font-weight="800">1. Connector 类型选择 Cloudflared</text>
    <rect x="0" y="206" width="802" height="82" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="28" y="258" font-family="Inter, Arial, sans-serif" font-size="24" fill="#166534" font-weight="800">2. Tunnel 名称：matrix-livekit-home</text>
    <rect x="0" y="318" width="802" height="82" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="28" y="370" font-family="Inter, Arial, sans-serif" font-size="24" fill="#9a3412" font-weight="800">3. 选择 Docker，复制 cloudflared token 命令</text>
    <rect x="0" y="448" width="802" height="96" rx="8" fill="#0f172a"/>
    <text x="28" y="488" font-family="Menlo, Consolas, monospace" font-size="19" fill="#bbf7d0">docker run -d --network host cloudflare/cloudflared:latest \</text>
    <text x="28" y="522" font-family="Menlo, Consolas, monospace" font-size="19" fill="#bbf7d0">  tunnel --no-autoupdate run --token &lt;TOKEN&gt;</text>
  </g>
  <path d="M286 386C330 386 330 386 346 386" stroke="#22d3ee" stroke-width="5" stroke-linecap="round"/>
  <path d="M334 374L350 386L334 398" fill="none" stroke="#22d3ee" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
