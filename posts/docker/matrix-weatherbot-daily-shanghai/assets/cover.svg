    <text x="28" y="37" font-family="Menlo, Consolas, monospace" font-size="24" fill="#ecfeff">0 5 * * * run-matrix-bot-weather.sh</text>
  </g>
  <g transform="translate(893 79)">
    <rect x="0" y="0" width="220" height="98" rx="8" fill="#ffffff" stroke="#76a99a" stroke-width="3"/>
    <text x="28" y="39" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#173f45">target user</text>
    <text x="28" y="72" font-family="Menlo, Consolas, monospace" font-size="18" fill="#366560">@honey</text>
  </g>
