    <rect x="155" y="318" width="76" height="76" rx="20" fill="#4cc3a5"/>
    <circle cx="193" cy="356" r="22" fill="none" stroke="#eafff9" stroke-width="10"/>
    <text x="255" y="348" fill="#12343b" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800">Element Web</text>
    <text x="255" y="395" fill="#3d6770" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">10.20.20.8:8181</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="620" y="250" width="360" height="230" rx="22" fill="#f3f6f8"/>
    <rect x="655" y="306" width="76" height="76" rx="18" fill="#2f7ee6"/>
    <path d="M686 345 h16 m-8 -8 v16" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
    <text x="755" y="332" fill="#14212b" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800">NPM</text>
    <text x="755" y="379" fill="#526476" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">HTTPS :12335</text>
    <text x="655" y="430" fill="#526476" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="24">element.666666.xyz</text>
  </g>

