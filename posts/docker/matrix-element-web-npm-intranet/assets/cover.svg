<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Element Web behind Nginx Proxy Manager</title>
  <desc id="desc">A diagram style cover showing Element Web, NPM HTTPS, and Synapse.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1f25"/>
      <stop offset="52%" stop-color="#12343b"/>
      <stop offset="100%" stop-color="#203a43"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef7f4"/>
      <stop offset="100%" stop-color="#d7ece7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#061114" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <path d="M0 650 C240 560 350 720 560 640 C760 560 910 690 1110 610 C1320 526 1420 590 1600 520 L1600 900 L0 900 Z" fill="#4cc3a5" opacity="0.2"/>
  <path d="M0 730 C260 650 410 790 620 710 C820 632 1040 780 1240 680 C1400 600 1490 650 1600 610 L1600 900 L0 900 Z" fill="#7dd3c7" opacity="0.23"/>

  <g transform="translate(110 110)">
