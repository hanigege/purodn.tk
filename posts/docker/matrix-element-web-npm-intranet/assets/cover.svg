    <rect x="1155" y="318" width="76" height="76" rx="20" fill="#244b5a"/>
    <path d="M1178 357 h30 m-15 -15 v30" stroke="#b8f3e4" stroke-width="9" stroke-linecap="round"/>
    <text x="1255" y="348" fill="#12343b" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800">Synapse</text>
    <text x="1255" y="395" fill="#3d6770" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">matrix:12335</text>
  </g>

  <g fill="none" stroke="#4cc3a5" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <path d="M505 365 H590"/>
    <path d="M570 335 L610 365 L570 395"/>
    <path d="M1005 365 H1090"/>
    <path d="M1070 335 L1110 365 L1070 395"/>
