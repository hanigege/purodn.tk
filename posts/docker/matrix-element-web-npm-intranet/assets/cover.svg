    <text x="0" y="72" fill="#9fd1c7" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="600">Matrix 管理登录客户端 / 内网 HTTPS 反代</text>
  </g>

  <g filter="url(#shadow)">
