    <text x="50" y="68" fill="#dffcf4" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="34">https://element.666666.xyz:12335/</text>
    <text x="675" y="68" fill="#7dd3c7" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">安全上下文</text>
