<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Matrix well-known through Cloudflare Worker</title>
  <desc id="desc">A Cloudflare Worker returns Matrix well-known configuration on standard HTTPS 443 while Synapse runs on a custom port.</desc>
  <rect width="1280" height="720" fill="#f4f0e8"/>
  <rect x="80" y="74" width="1120" height="572" rx="28" fill="#ffffff" stroke="#17202a" stroke-width="4"/>
  <text x="128" y="150" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" fill="#17202a">Matrix well-known</text>
  <text x="128" y="201" font-family="Inter, Arial, sans-serif" font-size="26" fill="#4c5c68">Cloudflare Worker + non-standard Synapse port + Element E2EE policy</text>

  <g transform="translate(128 282)">
    <rect width="250" height="156" rx="18" fill="#e7f3f7" stroke="#3b7788" stroke-width="3"/>
    <text x="32" y="64" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#12313a">Element</text>
    <text x="32" y="106" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#305866">example.com</text>
  </g>

  <path d="M 404 360 C 470 360, 500 360, 566 360" fill="none" stroke="#17202a" stroke-width="6" stroke-linecap="round"/>
  <path d="M 550 342 L 578 360 L 550 378" fill="none" stroke="#17202a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="424" y="328" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#4c5c68">443</text>

  <g transform="translate(596 248)">
    <rect width="260" height="224" rx="18" fill="#fff4d7" stroke="#c98719" stroke-width="3"/>
    <text x="32" y="62" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#553600">Worker</text>
    <text x="32" y="108" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#6a4c12">/.well-known</text>
    <text x="32" y="144" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#6a4c12">e2ee.force_disable</text>
    <text x="32" y="180" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#6a4c12">livekit service_url</text>
  </g>

  <path d="M 884 360 C 950 360, 980 360, 1046 360" fill="none" stroke="#17202a" stroke-width="6" stroke-linecap="round"/>
  <path d="M 1030 342 L 1058 360 L 1030 378" fill="none" stroke="#17202a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="908" y="328" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#4c5c68">12335</text>

  <g transform="translate(1078 282)">
    <rect width="122" height="156" rx="18" fill="#e9eee8" stroke="#537052" stroke-width="3"/>
    <text x="24" y="64" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" fill="#233c24">Synapse</text>
    <text x="24" y="106" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#365738">:12335</text>
  </g>

  <rect x="128" y="522" width="992" height="70" rx="12" fill="#17202a"/>
  <text x="158" y="566" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="24" fill="#f8fbff">"io.element.e2ee": { "default": false, "force_disable": true }</text>
</svg>
