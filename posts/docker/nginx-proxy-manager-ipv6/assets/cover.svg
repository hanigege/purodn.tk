<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Nginx Proxy Manager IPv6 cover</title>
  <desc id="desc">A Docker and IPv6 themed cover for Nginx Proxy Manager with matrix network and HTTPS port routing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#092018"/>
      <stop offset="0.5" stop-color="#123b35"/>
      <stop offset="1" stop-color="#13243e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6fff9" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#dff6ff" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <path d="M0 500 C210 430 340 560 550 492 C760 424 850 326 1200 392 L1200 630 L0 630 Z" fill="#0fcf84" opacity="0.16"/>
  <path d="M0 112 C190 44 342 152 560 88 C790 20 970 56 1200 18 L1200 0 L0 0 Z" fill="#7dd3fc" opacity="0.13"/>

  <g opacity="0.22" stroke="#d8fff0" stroke-width="2">
    <path d="M120 490 H1080"/>
    <path d="M180 138 H1010"/>
    <path d="M210 138 V490"/>
    <path d="M990 138 V490"/>
    <circle cx="210" cy="138" r="6" fill="#d8fff0"/>
    <circle cx="990" cy="138" r="6" fill="#d8fff0"/>
    <circle cx="210" cy="490" r="6" fill="#d8fff0"/>
    <circle cx="990" cy="490" r="6" fill="#d8fff0"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="92" y="96" width="1016" height="438" rx="34" fill="url(#card)"/>
  </g>

  <g transform="translate(132 134)">
    <rect x="0" y="0" width="250" height="80" rx="22" fill="#0f766e"/>
    <text x="32" y="51" font-family="Menlo, Consolas, monospace" font-size="34" fill="#ffffff" font-weight="700">NPM</text>
    <text x="124" y="51" font-family="Inter, Arial, sans-serif" font-size="24" fill="#cdfdf0">proxy</text>

    <text x="0" y="150" font-family="Inter, Arial, sans-serif" font-size="56" fill="#102a2b" font-weight="800">Nginx Proxy Manager</text>
    <text x="0" y="205" font-family="Inter, Arial, sans-serif" font-size="42" fill="#164e63" font-weight="700">IPv4 + IPv6 HTTPS routing</text>
    <text x="0" y="260" font-family="Inter, Arial, sans-serif" font-size="26" fill="#31575f">external Docker network: matrix</text>
  </g>

  <g transform="translate(726 145)">
    <rect x="0" y="0" width="300" height="312" rx="26" fill="#102a2b"/>
    <rect x="28" y="30" width="244" height="56" rx="14" fill="#134e4a"/>
    <text x="50" y="67" font-family="Menlo, Consolas, monospace" font-size="22" fill="#b7fff1">0.0.0.0:12335</text>
    <rect x="28" y="108" width="244" height="56" rx="14" fill="#14532d"/>
    <text x="50" y="145" font-family="Menlo, Consolas, monospace" font-size="22" fill="#d9f99d">[::]:12335</text>
    <rect x="28" y="186" width="244" height="56" rx="14" fill="#1e3a8a"/>
    <text x="50" y="223" font-family="Menlo, Consolas, monospace" font-size="22" fill="#bfdbfe">443 / TLS</text>
    <path d="M150 264 v30" stroke="#67e8f9" stroke-width="5" stroke-linecap="round"/>
    <path d="M132 279 l18 18 l18 -18" fill="none" stroke="#67e8f9" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(160 470)">
    <rect x="0" y="0" width="164" height="42" rx="21" fill="#0f766e"/>
    <text x="30" y="28" font-family="Inter, Arial, sans-serif" font-size="19" fill="#ffffff" font-weight="700">Synapse</text>
    <rect x="190" y="0" width="122" height="42" rx="21" fill="#0369a1"/>
    <text x="232" y="28" font-family="Inter, Arial, sans-serif" font-size="19" fill="#ffffff" font-weight="700">JWT</text>
    <rect x="338" y="0" width="146" height="42" rx="21" fill="#166534"/>
    <text x="382" y="28" font-family="Inter, Arial, sans-serif" font-size="19" fill="#ffffff" font-weight="700">LiveKit</text>
  </g>
</svg>
