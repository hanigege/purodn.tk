<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Matrix Synapse Server Notices media policy cover</title>
  <desc id="desc">A Matrix homeserver sends media retention notices to users.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.5" stop-color="#164e63"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.22" fill="none" stroke="#67e8f9" stroke-width="2">
    <path d="M140 132h920M140 498h920M240 80v470M960 80v470"/>
    <circle cx="240" cy="132" r="8" fill="#67e8f9"/>
    <circle cx="960" cy="132" r="8" fill="#67e8f9"/>
    <circle cx="240" cy="498" r="8" fill="#67e8f9"/>
    <circle cx="960" cy="498" r="8" fill="#67e8f9"/>
  </g>
  <rect x="112" y="104" width="348" height="422" rx="18" fill="#020617" stroke="#22d3ee" stroke-width="3"/>
  <rect x="148" y="145" width="276" height="58" rx="10" fill="#0f766e"/>
  <rect x="148" y="231" width="276" height="58" rx="10" fill="#0369a1"/>
  <rect x="148" y="317" width="276" height="58" rx="10" fill="#7c3aed"/>
  <rect x="148" y="403" width="196" height="58" rx="10" fill="#334155"/>
  <text x="286" y="182" text-anchor="middle" fill="#ecfeff" font-family="Arial, sans-serif" font-size="24" font-weight="700">Synapse</text>
  <text x="286" y="268" text-anchor="middle" fill="#eff6ff" font-family="Arial, sans-serif" font-size="22" font-weight="700">Admin API</text>
  <text x="286" y="354" text-anchor="middle" fill="#f5f3ff" font-family="Arial, sans-serif" font-size="22" font-weight="700">Server Notices</text>
  <text x="246" y="440" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="20" font-weight="700">Media Policy</text>
  <g transform="translate(548 116)">
    <rect width="520" height="398" rx="24" fill="url(#panel)" stroke="#cffafe" stroke-width="4"/>
    <rect x="42" y="42" width="436" height="68" rx="14" fill="#0f172a"/>
    <text x="260" y="84" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="28" font-weight="800">服务器媒体保留规则</text>
    <g font-family="Arial, sans-serif" font-size="25" fill="#0f172a" font-weight="700">
      <text x="62" y="162">&lt;= 5MiB: keep</text>
