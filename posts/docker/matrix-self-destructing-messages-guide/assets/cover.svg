<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Matrix message retention cover</title>
  <desc id="desc">A Matrix style chat retention diagram with Synapse, maubot, expiring messages, and a timer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10231f"/>
      <stop offset="0.48" stop-color="#1c3544"/>
      <stop offset="1" stop-color="#2f243d"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbf8"/>
      <stop offset="1" stop-color="#dceee6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <path d="M0 482 C160 422 254 562 415 493 C566 429 667 325 827 386 C982 445 1038 552 1200 488 L1200 630 L0 630 Z" fill="#43d19d" opacity="0.18"/>
  <path d="M0 98 C134 153 225 36 374 92 C505 141 593 237 760 184 C933 129 1010 55 1200 119 L1200 0 L0 0 Z" fill="#86d6ff" opacity="0.12"/>

  <g transform="translate(92 82)" filter="url(#shadow)">
    <rect width="1016" height="466" rx="28" fill="url(#panel)"/>
    <rect x="34" y="38" width="948" height="390" rx="20" fill="#122822"/>

    <g transform="translate(72 76)">
      <rect width="292" height="278" rx="18" fill="#193c35"/>
      <text x="28" y="48" fill="#c6f7dd" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Synapse</text>
      <text x="28" y="82" fill="#86d6ff" font-family="Inter, Arial, sans-serif" font-size="18">retention purge jobs</text>
      <g transform="translate(28 118)" fill="none" stroke="#59e5a9" stroke-width="5" stroke-linecap="round">
        <path d="M0 0 H170"/>
        <path d="M0 42 H206"/>
        <path d="M0 84 H142"/>
      </g>
      <g transform="translate(210 178)">
        <circle cx="34" cy="34" r="34" fill="#59e5a9"/>
        <path d="M34 15 V35 L49 45" fill="none" stroke="#10231f" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>

    <g transform="translate(454 76)">
      <rect width="292" height="278" rx="18" fill="#22384c"/>
      <text x="28" y="48" fill="#d5f0ff" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">maubot</text>
      <text x="28" y="82" fill="#9df0c2" font-family="Inter, Arial, sans-serif" font-size="18">expiringmessages</text>
      <rect x="28" y="124" width="204" height="42" rx="21" fill="#e9fff3"/>
      <text x="50" y="151" fill="#193c35" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">!expire set 7d</text>
      <rect x="28" y="184" width="154" height="42" rx="21" fill="#d5f0ff"/>
      <text x="50" y="211" fill="#22384c" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">redact</text>
      <path d="M218 206 l34 34 m0 -34 l-34 34" stroke="#ffcf70" stroke-width="8" stroke-linecap="round"/>
    </g>

    <g transform="translate(820 92)">
      <circle cx="74" cy="74" r="70" fill="#ffcf70"/>
      <circle cx="74" cy="74" r="50" fill="#122822"/>
      <path d="M74 38 V78 L103 95" fill="none" stroke="#ffcf70" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="8" y="190" width="132" height="72" rx="14" fill="#193c35"/>
      <text x="35" y="221" fill="#e9fff3" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">TTL</text>
      <text x="30" y="248" fill="#86d6ff" font-family="Inter, Arial, sans-serif" font-size="17">message</text>
    </g>

    <path d="M378 215 H430" stroke="#59e5a9" stroke-width="8" stroke-linecap="round"/>
    <path d="M760 215 H806" stroke="#59e5a9" stroke-width="8" stroke-linecap="round"/>
    <path d="M418 199 L438 215 L418 231" fill="none" stroke="#59e5a9" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M794 199 L814 215 L794 231" fill="none" stroke="#59e5a9" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="72" y="410" fill="#dff8ea" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800">Matrix 消息过期自动删除</text>
    <text x="72" y="444" fill="#9fc9bd" font-family="Inter, Arial, sans-serif" font-size="20">Synapse retention / maubot expiringmessages</text>
  </g>
</svg>
