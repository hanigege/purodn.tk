<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Docker installation, log rotation, and IPv6 cover</title>
  <desc id="desc">A Docker server diagram with Compose, log rotation, and IPv6 network lines.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1720"/>
      <stop offset="0.5" stop-color="#123647"/>
      <stop offset="1" stop-color="#0f2f28"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#d8eef7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>

  <g opacity="0.2" stroke="#8ee7d5" stroke-width="2" fill="none">
    <path d="M90 150H1190"/>
    <path d="M90 300H1190"/>
    <path d="M90 450H1190"/>
    <path d="M90 600H1190"/>
    <path d="M180 80V650"/>
    <path d="M420 80V650"/>
    <path d="M660 80V650"/>
    <path d="M900 80V650"/>
    <path d="M1140 80V650"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="126" y="112" width="1028" height="496" rx="28" fill="#0e2230" stroke="#57c7e8" stroke-width="2"/>
    <rect x="166" y="162" width="948" height="396" rx="18" fill="url(#panel)"/>
  </g>

  <g transform="translate(228 205)">
    <rect x="0" y="88" width="300" height="150" rx="18" fill="#1d9bd7"/>
    <rect x="38" y="47" width="42" height="38" rx="4" fill="#1d9bd7"/>
    <rect x="88" y="47" width="42" height="38" rx="4" fill="#1d9bd7"/>
    <rect x="138" y="47" width="42" height="38" rx="4" fill="#1d9bd7"/>
    <rect x="88" y="5" width="42" height="38" rx="4" fill="#1d9bd7"/>
    <rect x="138" y="5" width="42" height="38" rx="4" fill="#1d9bd7"/>
    <rect x="188" y="47" width="42" height="38" rx="4" fill="#1d9bd7"/>
    <path d="M32 142h245c-16 62-57 98-123 98H79c-39 0-62-30-47-98Z" fill="#0876ad"/>
    <circle cx="76" cy="156" r="8" fill="#e8f7fb"/>
    <path d="M245 119c22 0 40 12 50 30-25 2-45-6-60-25 4-3 7-5 10-5Z" fill="#0f526a"/>
  </g>

  <g font-family="Menlo, Consolas, monospace" font-size="28" font-weight="700">
    <text x="604" y="242" fill="#103241">Docker Engine</text>
    <text x="604" y="318" fill="#103241">Compose Plugin</text>
    <text x="604" y="394" fill="#103241">json-file rotate</text>
    <text x="604" y="470" fill="#103241">IPv6 when needed</text>
  </g>

  <g stroke-linecap="round" stroke-width="10" fill="none">
    <path d="M552 232h34" stroke="#1d9bd7"/>
    <path d="M552 308h34" stroke="#2f9e44"/>
    <path d="M552 384h34" stroke="#f08c00"/>
    <path d="M552 460h34" stroke="#7048e8"/>
  </g>

  <g transform="translate(840 214)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="0" width="190" height="112" rx="16" fill="#ffffff" stroke="#103241" stroke-width="5"/>
    <path d="M36 38h118M36 70h88" stroke="#f08c00" stroke-width="8"/>
    <path d="M24 140h142" stroke="#103241" stroke-width="5"/>
    <path d="M44 166h98" stroke="#103241" stroke-width="5"/>
    <path d="M72 112v54M122 112v54" stroke="#103241" stroke-width="5"/>
  </g>

  <g transform="translate(846 420)" font-family="Menlo, Consolas, monospace" font-size="24" font-weight="700">
    <rect x="0" y="0" width="178" height="68" rx="14" fill="#103241"/>
    <text x="22" y="43" fill="#8ee7d5">fd00::/80</text>
  </g>

  <text x="166" y="654" fill="#d8eef7" font-family="Arial, sans-serif" font-size="34" font-weight="700">Install, rotate logs, enable IPv6 only when it is needed</text>
</svg>
